<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IssaBookVibe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#0a0618 0%,#130826 55%,#091508 100%);font-family:'DM Sans',sans-serif;color:#f3e8ff;padding-bottom:60px}
input[type=text],input[type=file]{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(196,181,253,0.3);border-radius:12px;padding:12px 16px;color:#f3e8ff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
input[type=text]::placeholder{color:#6b7280}
input[type=text]:focus{border-color:#c084fc}
input[type=file]{padding:10px 14px;cursor:pointer;color:#c4b5fd}
input[type=file]::file-selector-button{background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.3);border-radius:8px;color:#c084fc;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-right:10px}
button{cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(192,132,252,0.4);border-radius:4px}
 
/* chips */
.chip{display:inline-flex;align-items:center;padding:7px 14px;border-radius:20px;border:2px solid #4a4a6a;background:rgba(255,255,255,0.05);color:#c4b5fd;font-size:12px;font-weight:600;cursor:pointer;margin:3px;transition:all 0.18s}
.chip.on{border-color:#c084fc;background:linear-gradient(135deg,#7e22ce,#be185d);color:#fff;font-weight:700}
.chip.nar{font-size:11px;padding:5px 11px;border-radius:16px;border:1.5px solid rgba(196,181,253,0.22);background:rgba(255,255,255,0.04);color:#c4b5fd}
.chip.nar.on{border-color:#a78bfa;background:rgba(167,139,250,0.18);color:#e9d5ff;font-weight:700}
.chip.emoji{font-size:20px;padding:6px 9px;border-radius:10px}
 
/* labels */
.slabel{color:#c4b5fd;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:18px;margin-bottom:8px}
.scard{background:rgba(255,255,255,0.03);border-radius:18px;padding:20px;border:1px solid rgba(192,132,252,0.12);margin-bottom:14px}
 
/* list options */
.listopt{padding:11px 16px;border-radius:11px;margin-bottom:6px;cursor:pointer;border:1.5px solid rgba(196,181,253,0.18);color:#c4b5fd;font-size:13px;background:rgba(255,255,255,0.04);transition:all 0.2s;font-family:'DM Sans',sans-serif}
.listopt.spice.on{background:linear-gradient(135deg,rgba(239,68,68,0.28),rgba(126,34,206,0.28));border-color:#ef4444;color:#fca5a5;font-weight:700}
.listopt.ending.on{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(6,95,70,0.18));border-color:#4ade80;color:#4ade80;font-weight:700}
.listopt.fvc.on{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(192,132,252,0.18));border-color:#4ade80;color:#4ade80;font-weight:700}
 
/* mic rating table */
.mic-table{width:100%;border-collapse:separate;border-spacing:0;margin-top:8px}
.mic-table th{color:#9ca3af;font-size:11px;font-weight:600;padding:8px 6px;text-align:center}
.mic-table th:first-child{text-align:left}
.mic-table td{padding:8px 6px;text-align:center;border-top:1px solid rgba(196,181,253,0.08)}
.mic-table td:first-child{color:#e9d5ff;font-size:13px;text-align:left;font-weight:500}
.mic-cell{font-size:18px;cursor:pointer;transition:filter 0.15s;display:inline-block}
.mic-cell.off{filter:saturate(0) opacity(0.25)}
.mic-cell.on{filter:saturate(1)}
 
/* section divider in form */
.char-section-head{font-size:14px;font-weight:800;margin:20px 0 14px;padding:10px 14px;border-radius:12px;letter-spacing:0}
</style>
</head>
<body>
<div id="app"></div>
 
<script>
// ── DATA (edit these lists anytime to update options) ─────────────
const DATA={
  authorVibes:['New To Me','Still On The Fence','Enjoy Their Work','One of My Faves'],
  source:['Audible','Libby/Hoopla','Spotify','Everand','Chirp','Other'],
  itsGiving:['Love of My Life','Can We Be Lovers & Friends','Twin Flames/Soul Ties','We Belong Together','If Spinning The Block Was A Couple','Torn Between The Two','Toxic AF','Sneaky Links/Secret Lovers','#RelationshipGoals','Certified Freaks','In Love With Another Man/Woman','Good Girl/Daddy Dynamic','Travel/Vacation/Getaway','Revenge/Lick Back','Half On A Baby, Surprise','Never Playing About You','Soft Life/Life of Luxury','Millenial Coded/Nostalgic','Work Baes','Sleeping with The Enemy','For the Grown & Sexy','Money, Power, & Respect','03 Bonnie & Clyde','I Fell for My Best Friend/Ex Sibling','The Boy Is Mine','Everything You Own in a Box to The Left','Take Love Slowly',"If Loving You is Wrong, I Don't Wanna Be Right",'Locked & Loaded','Fake Love, Do It for The Gram','Why You So Obsessed with Me'],
  fmc:['Material Girl/Bad & Boujee','Totally Relatable','Career Driven/Boss Babe','Quirky/Socially Awkward/Neurodivergent',"Little Miss Independent/I Don't Need a Man",'Lover Girl/Hopeless Romantic','Girl Next Door/Average/Sweetheart','Friend In My Head/Girls-Girl','Big Main Character Energy','Good Girl Gone Bad/Villain Era','She IS The DRAMA','A Little Delulu/Cray Cray','Not Likable/Annoying AF',"A Hot Mess but I'ma Stick Beside Her",'Other'],
  fmcNar:['Wesleigh Siobhan','Nicole Small','Trei Taylor','J. Shani Michaels','Alyx Monroe',"Ja'Air Bush",'Elyce Anthony','Lauryn Nichols','Adenrele Ojo','Eboni Flowers','Morae Brehon','Simone Rothschild','Nicola Lambo','Madison C. Marie','Charlie L. Wood','Katherine Dollison','LaRey Aris','Phoenix McKay','Erica Lynne','iiKane','Karmaa','Anna Lynn Wright','J.Y. Kora','Jacqi F. Lynn','Lacy Laurel','Jynelle Brown','Cherise Booth','Regina C. King','Eden Lafon','Bahni Turpin','Ebony Ford','Akwaeke Emezi','Sable Lyn','Indigo Brown','N/A','Other'],
  mmc:["He's A Good Man Savannah",'BDE/Major Zaddy Vibes','Certified Bookbae/My Type','He Got Money/Big Boss Energy','Unhinged And I Like It','Walking Red Flag/Fuck Boy','Quirky/Socially Awkward/Neurodivergent','Nonchalant/Chill/Laidback','Blunt/DGAF/No Filter','Corny AF/Lame',"Doesn't Do It for Me/Not Likable",'Other'],
  mmcNar:['Winston James','Jamie Lincoln Smith','Jakobi Diem','Emmanuel Ingram','Midnite Michael','Myles Washington','Leon Nixon','Sean Crisden','Shawn Moore','Benjamin Charles','Tony Isabella','Malik Rashad','Troy Duran','Chance Smolders','Sharif Stevens','Jaceon Hunter','Ace Bentley','Kevin Free','Ron Butler','Al Benelli','JD Jackson','Vance Goodwin','Tony Roberts','N/A','Other'],
  spice:['🚪 Closed-Door Romance','🫦 Flirty and Sweet','🤤 A Little Drool Worthy','🌶️ Spicy AF','💦 NSFW (Not Safe For Work)','🥵 Complete Smut No Plot'],
  plotHadMe:['IKYFL','I Was Rooting For You','Ooop','Biitttch',"I Know That's Right","I Can't",'That Escalated Quickly',"Don't Piss Me Off",'Clutching My Pearls','Gagged','Is The Plot In the Room With Us?','This is The Scheme That Todd Set-up'],
  thatEnding:['Cliffhanger','Felt Rushed','It Was Perfect','Had Me Wanting More',"It Was Aight, Could've Been Better",'WTF Was That','I Could Have Had a V8'],
  theFeels:['😊','🥰','😍','😆','🤣','😏','😬','😅','🤭','🫣','😒','🙄','🤔','🤨','😑','🫠','🥴','😳','😮','🫨','🤯','😠','🤬','😤','😕','😔','😫','😭','🥹','😢','💔','😰','😱','😮\u200d💨','🥱','🎢'],
  finalVibe:['Not My Vibe','DNF (Did Not Finish)','Almost DNF','Hated It','Overhyped','It Was OK','I Enjoyed It',"I Couldn't Get Enough",'Loved It','Top 10 Favorite List','Favorite Book Of All Time','Would Not Recommend','Would Totally Recommend','Memorable','Not Very Memorable','Realistic/Relatable','Unrealistic/Unrelatable','Totally My Vibe']
};
 
const STEPS=['📖 The Book',"✨ It's Giving",'👥 Characters','💬 The Verdict'];
 
// ── STATE ─────────────────────────────────────────────────────────
let S={
  step:0, view:'form', tab:'card',
  title:'', author:'', coverDataUrl:'',
  vibeEmojis:'', authorVibe:'', source:'',
  itsGiving:[],
  fmc:[], fmcNar:[], fmcMicRating:0,
  mmc:[], mmcNar:[], mmcMicRating:0,
  spice:'', plotHadMe:'', thatEnding:'',
  theFeels:[], finalVibe:[]
};
window.S=S;
 
// ── HELPERS ───────────────────────────────────────────────────────
function upd(){render()}
function toggle1(k,v){S[k]=S[k]===v?'':v;upd()}
function toggleN(k,v,max){
  const a=S[k];
  if(a.includes(v)){S[k]=a.filter(x=>x!==v)}
  else if(!max||a.length<max){S[k]=[...a,v]}
  upd();
}
function setMic(k,v){S[k]=S[k]===v?0:v;upd()}
window.toggle1=toggle1;window.toggleN=toggleN;window.setMic=setMic;
 
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function lbl(t){return `<div class="slabel">${t}</div>`}
function count(k,max){return `<div style="font-size:11px;color:#9ca3af;margin-bottom:8px">${S[k].length}/${max} selected</div>`}
 
// ── COVER UPLOAD ──────────────────────────────────────────────────
function handleCover(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{S.coverDataUrl=e.target.result;upd()};
  reader.readAsDataURL(file);
}
window.handleCover=handleCover;
 
// ── MIC RATING ROW ────────────────────────────────────────────────
function micRow(label, stateKey){
  const v=S[stateKey];
  const cells=[1,2,3,4,5].map(n=>`<td><span class="mic-cell ${n<=v?'on':'off'}" onclick="setMic('${stateKey}',${n})">🎙️</span></td>`).join('');
  return `<tr><td>${label}</td>${cells}</tr>`;
}
 
function micTable(fmcKey, mmcKey){
  return `<table class="mic-table">
    <thead><tr>
      <th></th>
      <th>🎙️</th><th>🎙️🎙️</th><th>🎙️🎙️🎙️</th><th>🎙️🎙️🎙️🎙️</th><th>🎙️🎙️🎙️🎙️🎙️</th>
    </tr></thead>
    <tbody>
      ${micRow('FMC',fmcKey)}
      ${micRow('MMC',mmcKey)}
    </tbody>
  </table>`;
}
 
// ── CHIP SETS ─────────────────────────────────────────────────────
function chipSet(k,opts,max){
  return `<div style="display:flex;flex-wrap:wrap">${opts.map(o=>{
    const on=Array.isArray(S[k])?S[k].includes(o):S[k]===o;
    const fn=Array.isArray(S[k])?`toggleN('${k}','${esc(o)}',${max||99})`:`toggle1('${k}','${esc(o)}')`;
    return `<span class="chip ${on?'on':''}" onclick="${fn}">${o}</span>`;
  }).join('')}</div>`;
}
function narChips(k,opts){
  return `<div style="display:flex;flex-wrap:wrap">${opts.map(o=>{
    const on=S[k].includes(o);
    return `<span class="chip nar ${on?'on':''}" onclick="toggleN('${k}','${esc(o)}')">${o}</span>`;
  }).join('')}</div>`;
}
function listOpts(k,opts,cls){
  return opts.map(o=>`<div class="listopt ${cls} ${S[k]===o?'on':''}" onclick="toggle1('${k}','${esc(o)}')">${o}</div>`).join('');
}
 
// ── FORM STEPS ────────────────────────────────────────────────────
function stepHTML(){
  if(S.step===0) return `
    ${lbl('Title *')}
    <input type="text" placeholder="What are we listening to?" value="${esc(S.title)}" oninput="S.title=this.value"/>
    ${lbl('Author *')}
    <input type="text" placeholder="Who wrote it?" value="${esc(S.author)}" oninput="S.author=this.value"/>
    ${lbl('Author Vibes (choose 1)')}${chipSet('authorVibe',DATA.authorVibes)}
    ${lbl('Source (choose 1)')}${chipSet('source',DATA.source)}
    ${lbl('Book Cover (optional)')}
    ${S.coverDataUrl
      ? `<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
           <img src="${S.coverDataUrl}" style="width:60px;height:80px;object-fit:cover;border-radius:8px;border:2px solid rgba(192,132,252,0.4)"/>
           <button onclick="S.coverDataUrl='';upd()" style="padding:6px 14px;border-radius:10px;border:1.5px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);color:#fca5a5;font-size:12px;font-weight:700">Remove</button>
         </div>`
      : ''}
    <input type="file" accept="image/*" onchange="handleCover(this)"/>
    ${lbl('Emojis That Represent The Overall Vibe (up to 3)')}
    <input type="text" placeholder="Type or paste up to 3 emojis ✨🔥💀" value="${Array.isArray(S.vibeEmojis)?S.vibeEmojis.join(''):S.vibeEmojis}" oninput="S.vibeEmojis=this.value" style="font-size:22px;letter-spacing:6px"/>`;
 
  if(S.step===1) return `
    ${lbl("It's Giving... (up to 5)")}${count('itsGiving',5)}
    ${chipSet('itsGiving',DATA.itsGiving,5)}
    <div style="margin-top:20px">
      ${lbl('Spice Factor (choose 1)')}
      ${listOpts('spice',DATA.spice,'spice')}
    </div>`;
 
  if(S.step===2) return `
    <div class="char-section-head" style="background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.25);color:#f9a8d4">
      She's That Girl — FMC
    </div>
    ${lbl('FMC Vibe (up to 3)')}${count('fmc',3)}
    ${chipSet('fmc',DATA.fmc,3)}
    ${lbl('FMC Narrator (select all that apply)')}
    ${narChips('fmcNar',DATA.fmcNar)}
    ${lbl('FMC Narration Rating')}
    <table class="mic-table">
      <thead><tr>
        <th></th><th>🎙️</th><th>🎙️🎙️</th><th>🎙️🎙️🎙️</th><th>🎙️🎙️🎙️🎙️</th><th>🎙️🎙️🎙️🎙️🎙️</th>
      </tr></thead>
      <tbody>${micRow('Rating','fmcMicRating')}</tbody>
    </table>
 
    <div class="char-section-head" style="background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);color:#c084fc;margin-top:10px">
      He's That Dude — MMC
    </div>
    ${lbl('MMC Vibe (up to 3)')}${count('mmc',3)}
    ${chipSet('mmc',DATA.mmc,3)}
    ${lbl('MMC Narrator (select all that apply)')}
    ${narChips('mmcNar',DATA.mmcNar)}
    ${lbl('MMC Narration Rating')}
    <table class="mic-table">
      <thead><tr>
        <th></th><th>🎙️</th><th>🎙️🎙️</th><th>🎙️🎙️🎙️</th><th>🎙️🎙️🎙️🎙️</th><th>🎙️🎙️🎙️🎙️🎙️</th>
      </tr></thead>
      <tbody>${micRow('Rating','mmcMicRating')}</tbody>
    </table>`;
 
  if(S.step===3) return `
    ${lbl('The Plot Had Me Like... (choose 1)')}
    ${chipSet('plotHadMe',DATA.plotHadMe)}
    <div style="margin-top:16px">
      ${lbl('That Ending Tho... (choose 1)')}
      ${listOpts('thatEnding',DATA.thatEnding,'ending')}
    </div>
    <div style="margin-top:16px">
      ${lbl('The Feels... (up to 3)')}${count('theFeels',3)}
      <div style="display:flex;flex-wrap:wrap;gap:3px">${DATA.theFeels.map(e=>`<span class="chip emoji ${S.theFeels.includes(e)?'on':''}" onclick="toggleN('theFeels','${e}',3)">${e}</span>`).join('')}</div>
    </div>
    <div style="margin-top:16px">
      ${lbl('Final Vibe Check (up to 3)')}${count('finalVibe',3)}
      ${DATA.finalVibe.map(v=>`<div class="listopt fvc ${S.finalVibe.includes(v)?'on':''}" onclick="toggleN('finalVibe','${esc(v)}',3)">${v}</div>`).join('')}
    </div>`;
}
 
// vibe emoji picker (separate from theFeels)
function pickVibeEmoji(e){
  if(!Array.isArray(S.vibeEmojis)) S.vibeEmojis=[];
  if(S.vibeEmojis.includes(e)){S.vibeEmojis=S.vibeEmojis.filter(x=>x!==e)}
  else if(S.vibeEmojis.length<3){S.vibeEmojis=[...S.vibeEmojis,e]}
  upd();
}
window.pickVibeEmoji=pickVibeEmoji;
 
// ── SHARE CARD ────────────────────────────────────────────────────
function shareCard(){
  const vibeEmojiStr=Array.isArray(S.vibeEmojis)?S.vibeEmojis.join(''):S.vibeEmojis;
  const micsStr=(n)=>n?'🎙️'.repeat(n):'';
 
  return `<div id="vibeCard" style="background:linear-gradient(160deg,#0f0a1e,#1a0533 45%,#0d1a0d);border-radius:24px;padding:26px 22px;max-width:420px;margin:0 auto;box-shadow:0 0 50px rgba(192,132,252,0.22),0 0 90px rgba(74,222,128,0.07);border:1px solid rgba(192,132,252,0.22);position:relative;overflow:hidden;font-family:'DM Sans',sans-serif">
    <div style="position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(236,72,153,0.18),transparent 70%);pointer-events:none"></div>
    <div style="position:absolute;bottom:-50px;left:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(74,222,128,0.13),transparent 70%);pointer-events:none"></div>
 
    <!-- LOGO -->
    <div style="text-align:center;margin-bottom:16px">
      <div style="display:inline-flex;align-items:center;gap:0;background:#000;padding:6px 14px;border-radius:10px;border:2px solid rgba(192,132,252,0.3)">
        <span style="color:#fff;font-size:16px;font-weight:900;font-family:'DM Sans',sans-serif">Issa</span>
        <span style="color:#f9a8d4;font-size:16px;font-weight:800;font-style:italic;margin-left:3px;font-family:'DM Sans',sans-serif">Book</span>
        <span style="color:#4ade80;font-size:16px;font-weight:900;letter-spacing:1px;margin-left:4px;font-family:'DM Sans',sans-serif">VIBE</span>
      </div>
      <div style="font-size:8px;color:#a78bfa;letter-spacing:4px;text-transform:uppercase;margin-top:4px;font-family:'DM Sans',sans-serif">audiobook log</div>
    </div>
 
    <!-- TITLE BLOCK -->
    <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:16px;padding:14px;background:rgba(255,255,255,0.04);border-radius:16px;border:1px solid rgba(192,132,252,0.16)">
      <!-- cover -->
      <div style="width:72px;height:96px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#7e22ce,#be185d);display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid rgba(192,132,252,0.35);box-shadow:3px 3px 14px rgba(0,0,0,0.5)">
        ${S.coverDataUrl?`<img src="${S.coverDataUrl}" style="width:100%;height:100%;object-fit:cover"/>`:'<span style="font-size:24px">📚</span>'}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:17px;font-weight:800;color:#f3e8ff;line-height:1.3;margin-bottom:3px;font-family:'DM Sans',sans-serif">${S.title||'Book Title'}</div>
        <div style="color:#c084fc;font-size:12px;margin-bottom:8px;font-family:'DM Sans',sans-serif">by ${S.author||'Author'}</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${S.authorVibe?`<span style="background:rgba(74,222,128,0.13);border:1px solid rgba(74,222,128,0.35);color:#4ade80;border-radius:8px;padding:2px 9px;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif">${S.authorVibe}</span>`:''}
          ${S.source?`<span style="background:rgba(167,139,250,0.13);border:1px solid rgba(167,139,250,0.35);color:#a78bfa;border-radius:8px;padding:2px 9px;font-size:10px;font-family:'DM Sans',sans-serif">🎧 ${S.source}</span>`:''}
        </div>
        ${vibeEmojiStr?`<div style="font-size:22px;margin-top:8px;letter-spacing:6px">${vibeEmojiStr}</div>`:''}
      </div>
    </div>
 
    <!-- IT'S GIVING -->
    ${S.itsGiving.length?`<div style="margin-bottom:14px">
      <div style="color:#f9a8d4;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;margin-bottom:7px;font-family:'DM Sans',sans-serif">✨ It's Giving...</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">${S.itsGiving.map(v=>`<span style="background:linear-gradient(135deg,rgba(126,34,206,0.3),rgba(190,24,93,0.3));border:1px solid rgba(192,132,252,0.3);color:#e9d5ff;border-radius:10px;padding:4px 10px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif">${v}</span>`).join('')}</div>
    </div>`:''}
 
    <!-- SPICE -->
    ${S.spice?`<div style="background:rgba(239,68,68,0.09);border:1px solid rgba(239,68,68,0.22);border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:19px">${S.spice.split(' ')[0]}</span>
      <span style="color:#fca5a5;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif">${S.spice.replace(/^\S+\s/,'')}</span>
    </div>`:''}
 
    <!-- FMC / MMC -->
    ${(S.fmc.length||S.mmc.length)?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div style="background:rgba(236,72,153,0.07);border:1px solid rgba(236,72,153,0.2);border-radius:12px;padding:10px">
        <div style="color:#f9a8d4;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:'DM Sans',sans-serif">She's That Girl</div>
        ${S.fmc.length?S.fmc.map(v=>`<div style="color:#f3e8ff;font-size:11px;font-weight:600;margin-bottom:3px;font-family:'DM Sans',sans-serif">• ${v}</div>`).join(''):'<div style="color:#6b7280;font-size:11px">—</div>'}
        ${S.fmcNar.length?`<div style="color:#9ca3af;font-size:10px;margin-top:5px;line-height:1.5;font-family:'DM Sans',sans-serif">🎙️ ${S.fmcNar.join(' · ')}</div>`:''}
        ${S.fmcMicRating?`<div style="margin-top:5px;font-size:12px">${'🎙️'.repeat(S.fmcMicRating)}</div>`:''}
      </div>
      <div style="background:rgba(124,58,237,0.07);border:1px solid rgba(124,58,237,0.2);border-radius:12px;padding:10px">
        <div style="color:#c084fc;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:'DM Sans',sans-serif">He's That Dude</div>
        ${S.mmc.length?S.mmc.map(v=>`<div style="color:#f3e8ff;font-size:11px;font-weight:600;margin-bottom:3px;font-family:'DM Sans',sans-serif">• ${v}</div>`).join(''):'<div style="color:#6b7280;font-size:11px">—</div>'}
        ${S.mmcNar.length?`<div style="color:#9ca3af;font-size:10px;margin-top:5px;line-height:1.5;font-family:'DM Sans',sans-serif">🎙️ ${S.mmcNar.join(' · ')}</div>`:''}
        ${S.mmcMicRating?`<div style="margin-top:5px;font-size:12px">${'🎙️'.repeat(S.mmcMicRating)}</div>`:''}
      </div>
    </div>`:''}
 
    <!-- PLOT / ENDING -->
    ${(S.plotHadMe||S.thatEnding)?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      ${S.plotHadMe?`<div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;text-align:center">
        <div style="color:#9ca3af;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-family:'DM Sans',sans-serif">The Plot Had Me Like</div>
        <div style="color:#e9d5ff;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif">${S.plotHadMe}</div>
      </div>`:''}
      ${S.thatEnding?`<div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;text-align:center">
        <div style="color:#9ca3af;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-family:'DM Sans',sans-serif">That Ending Tho...</div>
        <div style="color:#e9d5ff;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif">${S.thatEnding}</div>
      </div>`:''}
    </div>`:''}
 
    <!-- THE FEELS -->
    ${S.theFeels.length?`<div style="text-align:center;margin-bottom:14px">
      <div style="color:#9ca3af;font-size:9px;text-transform:uppercase;letter-spacing:2px;margin-bottom:7px;font-family:'DM Sans',sans-serif">The Feels...</div>
      <div style="font-size:32px;letter-spacing:10px">${S.theFeels.join('')}</div>
    </div>`:''}
 
    <!-- FINAL VIBE CHECK -->
    ${S.finalVibe.length?`<div style="background:linear-gradient(135deg,rgba(74,222,128,0.11),rgba(192,132,252,0.11));border:1px solid rgba(74,222,128,0.32);border-radius:14px;padding:14px;text-align:center">
      <div style="color:#4ade80;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;font-family:'DM Sans',sans-serif">✅ Final Vibe Check</div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:6px">${S.finalVibe.map(v=>`<span style="background:rgba(74,222,128,0.13);border:1px solid rgba(74,222,128,0.38);color:#4ade80;border-radius:10px;padding:4px 12px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif">${v}</span>`).join('')}</div>
    </div>`:''}
  </div>`;
}
 
// ── FULL JOURNAL ──────────────────────────────────────────────────
function fullJournal(){
  const vibeEmojiStr=Array.isArray(S.vibeEmojis)?S.vibeEmojis.join(''):S.vibeEmojis;
  function row(label,val){return val?`<div style="display:flex;gap:8px;margin-bottom:7px"><span style="color:#9ca3af;font-size:12px;min-width:110px;flex-shrink:0;font-family:'DM Sans',sans-serif">${label}</span><span style="color:#f3e8ff;font-size:12px;flex:1;font-family:'DM Sans',sans-serif">${val}</span></div>`:''}
  function sec(title,color,body){return body?`<div style="margin-bottom:18px"><div style="color:${color};font-size:14px;font-weight:800;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid ${color}33;font-family:'DM Sans',sans-serif">${title}</div>${body}</div>`:''}
  function tags(arr,color,bg){return arr.length?`<div style="display:flex;flex-wrap:wrap;gap:6px">${arr.map(v=>`<span style="background:${bg};border:1px solid ${color}55;color:${color};border-radius:10px;padding:3px 10px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif">${v}</span>`).join('')}</div>`:'' }
 
  return `<div id="fullLog" style="background:linear-gradient(160deg,#0f0a1e,#1a0533 55%,#0d1a0d);border-radius:24px;padding:26px 22px;max-width:420px;margin:0 auto;border:1px solid rgba(192,132,252,0.18)">
    <div style="text-align:center;margin-bottom:20px">
      <div style="color:#f9a8d4;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;font-family:'DM Sans',sans-serif">IssaBookVibe — Full Log</div>
      <div style="color:#f3e8ff;font-size:22px;font-weight:800;margin-top:8px;font-family:'DM Sans',sans-serif">${S.title||'—'}</div>
      <div style="color:#c084fc;font-size:13px;font-family:'DM Sans',sans-serif">by ${S.author||'—'}</div>
      ${vibeEmojiStr?`<div style="font-size:26px;margin-top:8px;letter-spacing:8px">${vibeEmojiStr}</div>`:''}
    </div>
    ${sec('📖 The Book','#c084fc', row('Author Vibes',S.authorVibe)+row('Source',S.source))}
    ${sec("✨ It's Giving...",'#f9a8d4', tags(S.itsGiving,'#f9a8d4','rgba(249,168,212,0.09)'))}
    ${sec('🌶️ Spice Factor','#fca5a5', S.spice?`<div style="background:rgba(239,68,68,0.09);border:1px solid rgba(239,68,68,0.22);border-radius:10px;padding:10px;color:#fca5a5;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif">${S.spice}</div>`:'')}
    ${sec('👥 The Characters','#4ade80',
      (S.fmc.length?`<div style="color:#f9a8d4;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:'DM Sans',sans-serif">She's That Girl</div>
        ${tags(S.fmc,'#f9a8d4','rgba(236,72,153,0.09)')}
        ${S.fmcNar.length?`<div style="color:#9ca3af;font-size:11px;margin-top:7px;font-family:'DM Sans',sans-serif">🎙️ ${S.fmcNar.join(' · ')}</div>`:''}
        ${S.fmcMicRating?`<div style="margin-top:5px;font-size:13px">${'🎙️'.repeat(S.fmcMicRating)}</div>`:''}`:'')+
      (S.mmc.length?`<div style="color:#c084fc;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px;font-family:'DM Sans',sans-serif">He's That Dude</div>
        ${tags(S.mmc,'#c084fc','rgba(124,58,237,0.09)')}
        ${S.mmcNar.length?`<div style="color:#9ca3af;font-size:11px;margin-top:7px;font-family:'DM Sans',sans-serif">🎙️ ${S.mmcNar.join(' · ')}</div>`:''}
        ${S.mmcMicRating?`<div style="margin-top:5px;font-size:13px">${'🎙️'.repeat(S.mmcMicRating)}</div>`:''}`:'')||'<span style="color:#6b7280;font-size:12px;font-family:DM Sans,sans-serif">No character info added</span>'
    )}
    ${sec('💬 The Verdict','#fbbf24',
      row('The Plot Had Me Like',S.plotHadMe)+
      row('That Ending Tho',S.thatEnding)+
      (S.theFeels.length?`<div style="margin-bottom:8px"><span style="color:#9ca3af;font-size:12px;display:block;margin-bottom:4px;font-family:'DM Sans',sans-serif">The Feels</span><span style="font-size:24px;letter-spacing:8px">${S.theFeels.join('')}</span></div>`:'')+
      (S.finalVibe.length?`<div style="margin-top:12px;background:linear-gradient(135deg,rgba(74,222,128,0.1),rgba(192,132,252,0.1));border:1px solid rgba(74,222,128,0.32);border-radius:12px;padding:12px;text-align:center">
        <div style="color:#4ade80;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;font-family:'DM Sans',sans-serif">Final Vibe Check</div>
        ${tags(S.finalVibe,'#4ade80','rgba(74,222,128,0.1)')}
      </div>`:'')||'<span style="color:#6b7280;font-size:12px;font-family:DM Sans,sans-serif">No verdict yet</span>'
    )}
  </div>`;
}
 
// ── SAVE AS IMAGE ─────────────────────────────────────────────────
function saveCard(){
  const el=document.getElementById('vibeCard');
  if(!el){alert('Generate the card first!');return;}
  const btn=document.getElementById('saveBtn');
  btn.textContent='Saving...';
  btn.disabled=true;
  html2canvas(el,{
    backgroundColor:'#0a0618',
    scale:3,
    useCORS:true,
    allowTaint:true,
    logging:false
  }).then(canvas=>{
    const link=document.createElement('a');
    link.download=`IssaBookVibe_${(S.title||'card').replace(/\s+/g,'_')}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    btn.textContent='💾 Save Vibe Card';
    btn.disabled=false;
  }).catch(()=>{
    btn.textContent='💾 Save Vibe Card';
    btn.disabled=false;
    alert('Could not save — try a screenshot!');
  });
}
function saveLog(){
  const el=document.getElementById('fullLog');
  if(!el){alert('No log to save!');return;}
  const btn=document.getElementById('saveLogBtn');
  btn.textContent='Saving...';
  btn.disabled=true;
  html2canvas(el,{
    backgroundColor:'#0a0618',
    scale:3,
    useCORS:true,
    allowTaint:true,
    logging:false
  }).then(canvas=>{
    const link=document.createElement('a');
    link.download=`IssaBookVibe_FullLog_${(S.title||'log').replace(/\s+/g,'_')}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    btn.textContent='💾 Save Full Log';
    btn.disabled=false;
  }).catch(()=>{
    btn.textContent='💾 Save Full Log';
    btn.disabled=false;
    alert('Could not save — try a screenshot!');
  });
}
window.saveCard=saveCard;
window.saveLog=saveLog;
 
// ── MAIN RENDER ───────────────────────────────────────────────────
function render(){
  const header=`<div style="background:linear-gradient(90deg,#12042a,#081208);padding:14px 24px;border-bottom:1px solid rgba(192,132,252,0.18);text-align:center;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)">
    <div style="display:inline-flex;align-items:center;gap:0;background:#000;padding:5px 12px;border-radius:9px;border:1.5px solid rgba(192,132,252,0.3)">
      <span style="color:#fff;font-size:14px;font-weight:900;font-family:'DM Sans',sans-serif">Issa</span>
      <span style="color:#f9a8d4;font-size:14px;font-weight:800;font-style:italic;margin-left:3px;font-family:'DM Sans',sans-serif">Book</span>
      <span style="color:#4ade80;font-size:14px;font-weight:900;letter-spacing:1px;margin-left:4px;font-family:'DM Sans',sans-serif">VIBE</span>
    </div>
    <div style="font-size:8px;color:#a78bfa;letter-spacing:4px;text-transform:uppercase;margin-top:3px;font-family:'DM Sans',sans-serif">audiobook log</div>
  </div>`;
 
  let body='';
 
  if(S.view==='form'){
    const pills=STEPS.map((s,i)=>`<button onclick="S.step=${i};render()" style="flex-shrink:0;padding:8px 14px;border-radius:20px;border:none;font-family:'DM Sans',sans-serif;background:${i===S.step?'linear-gradient(135deg,#7e22ce,#be185d)':i<S.step?'rgba(74,222,128,0.17)':'rgba(255,255,255,0.06)'};color:${i===S.step?'#fff':i<S.step?'#4ade80':'#9ca3af'};font-size:12px;font-weight:${i===S.step?800:600}">${i<S.step?'✓ ':''}${s}</button>`).join('');
    const prev=S.step>0?`<button onclick="S.step--;render()" style="flex:1;padding:14px;border-radius:14px;border:1.5px solid rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif">← Back</button>`:'';
    const next=S.step<STEPS.length-1
      ?`<button onclick="S.step++;render()" style="flex:2;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#7e22ce,#be185d);color:#fff;font-size:14px;font-weight:800;font-family:'DM Sans',sans-serif">Next: ${STEPS[S.step+1]} →</button>`
      :`<button onclick="S.view='result';render()" style="flex:2;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#15803d,#7e22ce);color:#fff;font-size:15px;font-weight:800;font-family:'DM Sans',sans-serif;box-shadow:0 0 22px rgba(74,222,128,0.28)">✨ Generate My Vibe Card ✨</button>`;
    body=`
      <div style="display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px">${pills}</div>
      <div class="scard">${stepHTML()}</div>
      <div style="display:flex;gap:12px">${prev}${next}</div>`;
  } else {
    const tabs=['card','detail'].map(t=>`<button onclick="S.tab='${t}';render()" style="flex:1;padding:12px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;background:${S.tab===t?'linear-gradient(135deg,#7e22ce,#be185d)':'rgba(255,255,255,0.06)'};color:${S.tab===t?'#fff':'#9ca3af'};font-size:13px;font-weight:700">${t==='card'?'📸 Vibe Card':'📖 Full Log'}</button>`).join('');
 
    const saveBtn=S.tab==='card'
      ?`<button id="saveBtn" onclick="saveCard()" style="width:100%;margin-top:12px;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#1d4ed8,#7e22ce);color:#fff;font-size:14px;font-weight:800;font-family:'DM Sans',sans-serif;box-shadow:0 0 18px rgba(99,102,241,0.3)">💾 Save Vibe Card</button>`
      :`<button id="saveLogBtn" onclick="saveLog()" style="width:100%;margin-top:12px;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#1d4ed8,#7e22ce);color:#fff;font-size:14px;font-weight:800;font-family:'DM Sans',sans-serif;box-shadow:0 0 18px rgba(99,102,241,0.3)">💾 Save Full Log</button>`;
 
    body=`
      <div style="display:flex;gap:8px;margin-bottom:18px">${tabs}</div>
      ${S.tab==='card'?shareCard():fullJournal()}
      ${saveBtn}
      <button onclick="S.view='form';S.step=0;render()" style="width:100%;margin-top:10px;padding:14px;border-radius:14px;border:1.5px solid rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif">← Log Another Book</button>`;
  }
 
  document.getElementById('app').innerHTML=header+`<div style="max-width:480px;margin:0 auto;padding:20px 16px">${body}</div>`;
}
window.render=render;
render();
</script>
