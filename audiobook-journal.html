<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IssaBookVibe — Audiobook Journal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#0a0618 0%,#130826 55%,#091508 100%);font-family:'DM Sans',sans-serif;color:#f3e8ff;padding-bottom:80px}
input[type=text],input[type=date],textarea,select{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(196,181,253,0.3);border-radius:12px;padding:11px 14px;color:#f3e8ff;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;appearance:none}
input[type=text]::placeholder,textarea::placeholder{color:#6b7280}
input[type=text]:focus,textarea:focus,select:focus,input[type=date]:focus{border-color:#c084fc}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
input[type=file]{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(196,181,253,0.3);border-radius:12px;padding:10px 14px;color:#c4b5fd;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
input[type=file]::file-selector-button{background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.3);border-radius:8px;color:#c084fc;padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-right:8px}
textarea{resize:vertical;min-height:80px}
select option{background:#1e1b4b;color:#f3e8ff}
button{cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(192,132,252,0.4);border-radius:4px}
.chip{display:inline-flex;align-items:center;padding:6px 13px;border-radius:20px;border:2px solid #4a4a6a;background:rgba(255,255,255,0.05);color:#c4b5fd;font-size:12px;font-weight:600;cursor:pointer;margin:3px;transition:all 0.18s}
.chip.on{border-color:#c084fc;background:linear-gradient(135deg,#7e22ce,#be185d);color:#fff;font-weight:700}
.slabel{color:#c4b5fd;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:16px;margin-bottom:7px;display:block}
.scard{background:rgba(255,255,255,0.03);border-radius:18px;padding:18px;border:1px solid rgba(192,132,252,0.12);margin-bottom:12px}
.listopt{padding:10px 15px;border-radius:11px;margin-bottom:5px;cursor:pointer;border:1.5px solid rgba(196,181,253,0.18);color:#c4b5fd;font-size:13px;background:rgba(255,255,255,0.04);transition:all 0.2s}
.listopt.spice.on{background:linear-gradient(135deg,rgba(239,68,68,0.28),rgba(126,34,206,0.28));border-color:#ef4444;color:#fca5a5;font-weight:700}
.listopt.ending.on{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(6,95,70,0.18));border-color:#4ade80;color:#4ade80;font-weight:700}
.listopt.fvc.on{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(192,132,252,0.18));border-color:#4ade80;color:#4ade80;font-weight:700}
.char-head{font-size:14px;font-weight:800;margin:18px 0 12px;padding:9px 13px;border-radius:12px}
.star-table,.mic-table{width:100%;border-collapse:separate;border-spacing:0;margin-top:8px}
.star-table th,.mic-table th{color:#9ca3af;font-size:11px;font-weight:600;padding:7px 5px;text-align:center}
.star-table th:first-child,.mic-table th:first-child{text-align:left;padding-left:0}
.star-table td,.mic-table td{padding:8px 5px;text-align:center;border-top:1px solid rgba(196,181,253,0.08)}
.star-table td:first-child,.mic-table td:first-child{color:#e9d5ff;font-size:13px;text-align:left;font-weight:500;padding-left:0}
.star-cell,.mic-cell{font-size:17px;cursor:pointer;transition:filter 0.15s;display:inline-block}
.star-cell.off,.mic-cell.off{filter:saturate(0) opacity(0.25)}
.star-cell.on,.mic-cell.on{filter:saturate(1)}
.optional-tag{font-size:10px;color:#6b7280;font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px}
.add-char-btn{width:100%;padding:13px;border-radius:14px;border:1.5px dashed rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;margin-bottom:9px;transition:all 0.2s}
.add-char-btn:hover{border-color:#c084fc;color:#e9d5ff}
.char-card{background:rgba(255,255,255,0.03);border-radius:14px;padding:13px;margin-bottom:10px;border:1px solid rgba(192,132,252,0.18)}
.char-card.fmc{border-left:3px solid #f9a8d4}
.char-card.mmc{border-left:3px solid #c084fc}
.char-card.sfc{border-left:3px solid #fb7185}
.char-card.smc{border-left:3px solid #818cf8}
.char-card.add{border-left:3px solid #4ade80}
.remove-char-btn{float:right;background:transparent;border:none;color:#fca5a5;font-size:16px;cursor:pointer;padding:0;line-height:1}
.treachery-divider{display:flex;align-items:center;gap:10px;margin:18px 0 12px}
.treachery-divider .line{flex:1;height:1px;background:rgba(249,168,212,0.25)}
.treachery-divider .text{color:#f9a8d4;font-size:13px;font-weight:700;font-style:italic;font-family:'DM Sans',sans-serif}
.privacy-note{text-align:center;color:#6b7280;font-size:10px;margin-top:24px;padding:12px;line-height:1.5;font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SHEETS_WEBHOOK_URL = 'PASTE_YOUR_WEB_APP_URL_HERE';
 
const DATA={
  authorVibes:['New To Me','Still On The Fence','Enjoy Their Work','One of My Faves','Not My Vibe'],
  source:['Audible','Libby/Hoopla','Spotify','Everand','Chirp','Other'],
  listeningSpeed:['1.0x','1.25x','1.5x','1.7x','2x','2.25x+'],
  pov:['First Person','Third Person','Both'],
  itsGiving:['Can We Be Lovers & Friends','Twin Flames/Soul Ties','They Belong Together Fr','If Spinning The Block Was A Couple','Torn Between The Two','Toxic AF','Sneaky Links/Secret Lovers','#RelationshipGoals','Certified Freaks','In Love With Another Man/Woman','Good Girl/Daddy Dynamic','Travel/Vacation/Getaway','Revenge/Lick Back','Half On A Baby, Surprise','Never Playing About You','Soft Life/Life of Luxury','Millenial Coded/Nostalgic','Work Baes','Sleeping with The Enemy','For the Grown & Sexy','Money, Power, & Respect','03 Bonnie & Clyde','I Fell for My Best Friend/Ex Sibling','The Boy Is Mine','Everything You Own in a Box to The Left','Take Love Slowly',"If Loving You is Wrong, I Don't Wanna Be Right",'Locked & Loaded','Fake Love, Do It for The Gram','Why You So Obsessed with Me',"Age Ain't Nothing But A Number",'You, Me, and Them/Why Choose','Sweetest Taboo','A Tyler Perry/Tubi Movie','He Fell First'],
  triggerWarnings:['Domestic Violence/Abuse','Sexual Assault/Rape','Addiction/Substance Abuse','Suicide/Self Harm','Mental Illness/Disorders','Disability/Sickness','Miscarriage/Infertility','Loss/Grief','Societal Issues','Graphic Details','Tragedy/Death','Other','N/A'],
  fmcVibes:['Material Girl/Bad & Boujee/Rich Auntie','Totally Relatable','Career Driven/Boss Babe','Quirky/Socially Awkward/Neurodivergent',"Little Miss Independent/I Don't Need a Man",'Lover Girl/Hopeless Romantic','Girl Next Door/Sweetheart','Average/Basic','Friend In My Head/Girls-Girl','Big Main Character Energy','Good Girl Gone Bad/Villain Era','She IS The DRAMA','A Little Delulu/Cray Cray','She About That Life','Not Likable/Annoying AF','Mean Girl','A Hoe Lotta Fun',"A Hot Mess but I'ma Stick Beside Her",'Blunt/DGAF/No Filter','Other'],
  // SFC = FMC vibes + 3 SFC-only additions
  sfcVibes:['Material Girl/Bad & Boujee/Rich Auntie','Totally Relatable','Career Driven/Boss Babe','Quirky/Socially Awkward/Neurodivergent',"Little Miss Independent/I Don't Need a Man",'Lover Girl/Hopeless Romantic','Girl Next Door/Sweetheart','Average/Basic','Friend In My Head/Girls-Girl','Big Main Character Energy','Good Girl Gone Bad/Villain Era','She IS The DRAMA','A Little Delulu/Cray Cray','She About That Life','Not Likable/Annoying AF','Mean Girl','A Hoe Lotta Fun',"A Hot Mess but I'ma Stick Beside Her",'Blunt/DGAF/No Filter','The Perfect Bestie/Partner in Crime','Cousin Faith Energy/Frenemy','Hater/Cockblocker','Other'],
  mmcVibes:["He's A Good Man Savannah",'BDE/Major Zaddy Vibes','Certified Bookbae/My Type IRL','He Got Money/Big Boss Energy','Unhinged And I Like It','Walking Red Flag/Fuck Boy','Quirky/Socially Awkward/Neurodivergent','Nonchalant/Chill/Laidback','Romantic/Loverboy','Mr. Steal Your Girl','Blunt/DGAF/No Filter','Corny AF/Lame',"Doesn't Do It for Me/Not Likable",'Other'],
  // SMC = MMC vibes + 2 SMC-only additions
  smcVibes:["He's A Good Man Savannah",'BDE/Major Zaddy Vibes','Certified Bookbae/My Type IRL','He Got Money/Big Boss Energy','Unhinged And I Like It','Walking Red Flag/Fuck Boy','Quirky/Socially Awkward/Neurodivergent','Nonchalant/Chill/Laidback','Romantic/Loverboy','Mr. Steal Your Girl','Blunt/DGAF/No Filter','Corny AF/Lame',"Doesn't Do It for Me/Not Likable",'Perfect Wingman/Partner in Crime','Hater/Cockblocker','Other'],
  spice:['🚪 Closed-Door Romance','🫦 Flirty and Sweet','🤤 A Little Drool Worthy','🌶️ Spicy AF','💦 NSFW (Not Safe For Work)','🥵 Complete Smut No Plot'],
  plotHadMe:['IKYFL','I Was Rooting For You','Ooop','Biitttch',"I Know That's Right","I Can't",'That Escalated Quickly',"Don't Piss Me Off",'Clutching My Pearls','Gagged','Is The Plot In the Room With Us?','This is The Scheme That Todd Set-up','Not Me Crying','I Have No Words','Clock That Tea'],
  thatEnding:['Cliffhanger','Felt Rushed','It Works','Happily Ever After or Whatever','Had Me Wanting More',"It Was Aight, Could've Been Better",'WTF Was That','I Could Have Had a V8'],
  finalVibe:['Not My Vibe','DNF (Did Not Finish)','Almost DNF','Hated It','Overhyped','It Was OK','I Enjoyed It',"I Couldn't Get Enough",'Loved It','Top 10 Favorite List','Favorite Book Of All Time','Would Not Recommend','Would Totally Recommend','Memorable','Not Very Memorable','Realistic/Relatable','Unrealistic/Unrelatable','Totally My Vibe']
};
 
const STEPS=['📖 The Book',"✨ It's Giving",'👥 Characters','💬 The Verdict'];
 
let S={
  step:0, view:'form',
  title:'', author:'', coverDataUrl:'',
  authorVibe:'', source:'', listeningSpeed:'',
  dateStart:'', dateEnd:'', length:'', series:'', pov:'', setting:'', premise:'',
  vibeEmojis:'',
  itsGiving:[], themeSong:'', memeDataUrl:'', triggerWarnings:[], gagMoment:'',
  // Character cards — start collapsed
  fmcAdded:false, fmcName:'', fmcAbout:'', fmcVibe:[], fmcNarrator:'', fmcMicRating:0,
  mmcAdded:false, mmcName:'', mmcAbout:'', mmcVibe:[], mmcNarrator:'', mmcMicRating:0,
  sfcAdded:false, sfcName:'', sfcAbout:'', sfcVibe:[], sfcNarrator:'', sfcMicRating:0,
  smcAdded:false, smcName:'', smcAbout:'', smcVibe:[], smcNarrator:'', smcMicRating:0,
  addAdded:false, addCharText:'',
  spice:'', plotHadMe:'', thatEnding:'',
  overview:'', qtna:'',
  starWriting:0, starPace:0, starCharDev:0, starUniverse:0, starEase:0, starOverall:0,
  finalVibe:[], readingVibe:'',
  // Audiobook overall narration ratings (kept from original)
  narrFMC:0, narrMMC:0, narrSecondary:0, narrTreachery:0, narrOverall:0
};
window.S=S;
 
function upd(){render()}
function toggle1(k,v){S[k]=S[k]===v?'':v;upd()}
function toggleN(k,v,max){
  const a=S[k];
  if(a.includes(v)){S[k]=a.filter(x=>x!==v)}
  else if(!max||a.length<max){S[k]=[...a,v]}
  upd();
}
function setStar(k,v){S[k]=S[k]===v?0:v;upd()}
function addChar(key){S[key+'Added']=true;upd()}
function removeChar(key){
  S[key+'Added']=false;
  S[key+'Name']='';S[key+'About']='';S[key+'Vibe']=[];
  S[key+'Narrator']='';S[key+'MicRating']=0;
  upd();
}
function addAddtl(){S.addAdded=true;upd()}
function removeAddtl(){S.addAdded=false;S.addCharText='';upd()}
window.toggle1=toggle1;window.toggleN=toggleN;window.setStar=setStar;
window.addChar=addChar;window.removeChar=removeChar;window.addAddtl=addAddtl;window.removeAddtl=removeAddtl;
 
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function lbl(t,opt){return `<span class="slabel">${t}${opt?`<span class="optional-tag">(optional)</span>`:''}</span>`}
function count(k,max){return `<div style="font-size:11px;color:#9ca3af;margin-bottom:7px">${S[k].length}/${max} selected</div>`}
 
function handleCover(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{S.coverDataUrl=e.target.result;upd()};
  reader.readAsDataURL(file);
}
function handleMeme(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{S.memeDataUrl=e.target.result;upd()};
  reader.readAsDataURL(file);
}
window.handleCover=handleCover;window.handleMeme=handleMeme;
 
function chipSet(k,opts,max){
  return `<div style="display:flex;flex-wrap:wrap">${opts.map(o=>{
    const on=Array.isArray(S[k])?S[k].includes(o):S[k]===o;
    const fn=Array.isArray(S[k])?`toggleN('${k}','${esc(o)}',${max||99})`:`toggle1('${k}','${esc(o)}')`;
    return `<span class="chip ${on?'on':''}" onclick="${fn}">${o}</span>`;
  }).join('')}</div>`;
}
function listOpts(k,opts,cls){
  return opts.map(o=>`<div class="listopt ${cls} ${S[k]===o?'on':''}" onclick="toggle1('${k}','${esc(o)}')">${o}</div>`).join('');
}
function selOpts(k,opts,placeholder){
  return `<select onchange="S['${k}']=this.value;upd()"><option value="">${placeholder}</option>${opts.map(o=>`<option value="${esc(o)}" ${S[k]===o?'selected':''}>${o}</option>`).join('')}</select>`;
}
function starRow(label,key){
  const v=S[key];
  return `<tr><td>${label}</td>${[1,2,3,4,5].map(n=>`<td><span class="star-cell ${n<=v?'on':'off'}" onclick="setStar('${key}',${n})">⭐</span></td>`).join('')}</tr>`;
}
function micRow(label,key){
  const v=S[key];
  return `<tr><td>${label}</td>${[1,2,3,4,5].map(n=>`<td><span class="mic-cell ${n<=v?'on':'off'}" onclick="setStar('${key}',${n})">🎙️</span></td>`).join('')}</tr>`;
}
function inp(k,placeholder,multiline=false,rows=2){
  if(multiline) return `<textarea placeholder="${placeholder}" oninput="S['${k}']=this.value" rows="${rows}">${S[k]||''}</textarea>`;
  return `<input type="text" placeholder="${placeholder}" value="${esc(S[k]||'')}" oninput="S['${k}']=this.value"/>`;
}
 
// ── CHARACTER CARDS (with narrator for audiobook journal) ─────────
function charCard(key, label, color, vibesList, cardClass){
  if(!S[key+'Added']){
    return `<button class="add-char-btn" onclick="addChar('${key}')">+ Add ${label}</button>`;
  }
  return `<div class="char-card ${cardClass}">
    <div class="char-head" style="background:${color}1a;border:1px solid ${color}40;color:${color};margin:0 0 12px">
      ${label}
      <button class="remove-char-btn" onclick="removeChar('${key}')">✕</button>
    </div>
    ${lbl(`${label} Name`,true)}
    <input type="text" placeholder="Character name" value="${esc(S[key+'Name']||'')}" oninput="S['${key}Name']=this.value"/>
    ${lbl(`About ${label}`,true)}
    <textarea placeholder="About The Character ie age, occupation, and etc" oninput="S['${key}About']=this.value" rows="2">${S[key+'About']||''}</textarea>
    ${lbl(`${label} Vibe (up to 3)`)}${count(key+'Vibe',3)}
    ${chipSet(key+'Vibe',vibesList,3)}
    ${lbl('Narrator',true)}
    <input type="text" placeholder="Type the narrator's name" value="${esc(S[key+'Narrator']||'')}" oninput="S['${key}Narrator']=this.value"/>
    ${lbl('Narrator Rating',true)}
    <table class="mic-table">
      <thead><tr>
        <th></th><th>🎙️</th><th>🎙️🎙️</th><th>🎙️🎙️🎙️</th><th>🎙️🎙️🎙️🎙️</th><th>🎙️🎙️🎙️🎙️🎙️</th>
      </tr></thead>
      <tbody>${micRow('Rating',key+'MicRating')}</tbody>
    </table>
  </div>`;
}
 
function additionalCharCard(){
  if(!S.addAdded){
    return `<button class="add-char-btn" onclick="addAddtl()">+ Add Additional Key Characters</button>`;
  }
  return `<div class="char-card add">
    <div class="char-head" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.4);color:#4ade80;margin:0 0 12px">
      Additional Key Characters
      <button class="remove-char-btn" onclick="removeAddtl()">✕</button>
    </div>
    ${lbl('List any additional characters and their roles',true)}
    <textarea placeholder="List any other characters worth mentioning and their role in the story" oninput="S.addCharText=this.value" rows="4">${S.addCharText||''}</textarea>
  </div>`;
}
 
// ── STEPS ─────────────────────────────────────────────────────────
function stepHTML(){
  if(S.step===0) return `
    ${lbl('Title *')}${inp('title','What are we listening to?')}
    ${lbl('Author *')}${inp('author','Who wrote it?')}
    ${lbl('Author Vibes (choose 1)')}${chipSet('authorVibe',DATA.authorVibes)}
    ${lbl('Source (choose 1)')}${chipSet('source',DATA.source)}
    ${lbl('Listening Speed (choose 1)')}${chipSet('listeningSpeed',DATA.listeningSpeed)}
    ${lbl('Book Cover',true)}
    ${S.coverDataUrl?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <img src="${S.coverDataUrl}" style="width:55px;height:75px;object-fit:cover;border-radius:8px;border:2px solid rgba(192,132,252,0.4)"/>
      <button onclick="S.coverDataUrl='';upd()" style="padding:5px 12px;border-radius:9px;border:1.5px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);color:#fca5a5;font-size:12px;font-weight:700">Remove</button>
    </div>`:''}
    <input type="file" accept="image/*" onchange="handleCover(this)"/>
    ${lbl('Date Started *')}<input type="date" value="${S.dateStart||''}" onchange="S.dateStart=this.value;upd()" style="color:${S.dateStart?'#f3e8ff':'#6b7280'}"/>
    ${lbl('Date Finished',true)}<input type="date" value="${S.dateEnd||''}" onchange="S.dateEnd=this.value;upd()" style="color:${S.dateEnd?'#f3e8ff':'#6b7280'}"/>
    <div style="font-size:11px;color:#6b7280;margin-top:4px">Leave blank if you haven't finished yet</div>
    ${lbl('Length (hours/minutes) *')}${inp('length','e.g. 12h 30m')}
    ${lbl('Series *')}${inp('series','Series name & book number, or N/A')}
    ${lbl('POV (choose 1)')}${selOpts('pov',DATA.pov,'Select POV...')}
    ${lbl('Setting *')}${inp('setting','Main location / time period')}
    ${lbl('Premise / Blurb *')}${inp('premise','The rundown — spoil it or keep it cute',true,3)}
    ${lbl('The Emoji Vibes (up to 5)')}
    <input type="text" placeholder="Input up to 5 Emojis That Represent The Overall Vibe" value="${esc(S.vibeEmojis||'')}" oninput="S.vibeEmojis=this.value" style="font-size:22px;letter-spacing:6px"/>`;
 
  if(S.step===1) return `
    ${lbl("It's Giving... (up to 5)")}${count('itsGiving',5)}${chipSet('itsGiving',DATA.itsGiving,5)}
    ${lbl('Spice Factor (choose 1)')}${listOpts('spice',DATA.spice,'spice')}
    ${lbl('Trigger Warnings? (select all that apply)')}${chipSet('triggerWarnings',DATA.triggerWarnings,99)}
    ${lbl('Theme Song',true)}${inp('themeSong','What song was playing in your head?')}
    ${lbl('Meme or GIF to Describe The Vibe',true)}
    ${S.memeDataUrl?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <img src="${S.memeDataUrl}" style="width:80px;height:60px;object-fit:cover;border-radius:8px;border:2px solid rgba(192,132,252,0.4)"/>
      <button onclick="S.memeDataUrl='';upd()" style="padding:5px 12px;border-radius:9px;border:1.5px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);color:#fca5a5;font-size:12px;font-weight:700">Remove</button>
    </div>`:''}
    <input type="file" accept="image/*" onchange="handleMeme(this)"/>
    ${lbl('Most Gag-Worthy Moment / Favorite Quotes',true)}${inp('gagMoment','The moment you had to put the book down',true,3)}`;
 
  if(S.step===2) return `
    ${charCard('fmc',"Female Main Character",'#f9a8d4',DATA.fmcVibes,'fmc')}
    ${charCard('mmc',"Male Main Character",'#c084fc',DATA.mmcVibes,'mmc')}
    <div class="treachery-divider">
      <div class="line"></div>
      <div class="text">Treachery Characters</div>
      <div class="line"></div>
    </div>
    ${charCard('sfc',"Secondary Female Character",'#fb7185',DATA.sfcVibes,'sfc')}
    ${charCard('smc',"Secondary Male Character",'#818cf8',DATA.smcVibes,'smc')}
    ${additionalCharCard()}
    <div style="margin-top:18px">
      ${lbl('Overall Narration Rating 🎙️ (tap to rate)')}
      <table class="mic-table">
        <thead><tr><th></th><th>🎙️</th><th>🎙️🎙️</th><th>🎙️🎙️🎙️</th><th>🎙️🎙️🎙️🎙️</th><th>🎙️🎙️🎙️🎙️🎙️</th></tr></thead>
        <tbody>
          ${micRow('FMC','narrFMC')}

function sendToSheets(){

  const payload = {
    tab: 'Journals',
    data: {
      timestamp: new Date().toISOString(),
      source: 'audiobook-journal',
      title: S.title, author: S.author,
      authorVibe: S.authorVibe, audioSource: S.source, listeningSpeed: S.listeningSpeed,
      dateStart: S.dateStart, dateEnd: S.dateEnd, length: S.length, series: S.series,
      pov: S.pov, setting: S.setting, premise: S.premise,
      vibeEmojis: S.vibeEmojis,
      itsGiving: S.itsGiving, spice: S.spice,
      triggerWarnings: S.triggerWarnings, themeSong: S.themeSong, gagMoment: S.gagMoment,
      fmc:{added:S.fmcAdded,name:S.fmcName,about:S.fmcAbout,vibe:S.fmcVibe,narrator:S.fmcNarrator,rating:S.fmcMicRating},
      mmc:{added:S.mmcAdded,name:S.mmcName,about:S.mmcAbout,vibe:S.mmcVibe,narrator:S.mmcNarrator,rating:S.mmcMicRating},
      sfc:{added:S.sfcAdded,name:S.sfcName,about:S.sfcAbout,vibe:S.sfcVibe,narrator:S.sfcNarrator,rating:S.sfcMicRating},
      smc:{added:S.smcAdded,name:S.smcName,about:S.smcAbout,vibe:S.smcVibe,narrator:S.smcNarrator,rating:S.smcMicRating},
      additionalChars: S.addAdded?S.addCharText:'',
      narration:{fmc:S.narrFMC,mmc:S.narrMMC,secondary:S.narrSecondary,overall:S.narrOverall},
      plotHadMe: S.plotHadMe, thatEnding: S.thatEnding,
      analysis:{writing:S.starWriting,pace:S.starPace,charDev:S.starCharDev,universe:S.starUniverse,ease:S.starEase,overall:S.starOverall},
      overview: S.overview, qtna: S.qtna, listeningVibe: S.readingVibe,
      finalVibe: S.finalVibe
    }
  };
  try{
    fetch(SHEETS_WEBHOOK_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).catch(()=>{});
  }catch(e){}
}
 
function saveJournal(){
  const el=document.getElementById('journalPage');
  if(!el){alert('Generate the journal first!');return;}
  const btn=document.getElementById('savePdfBtn');
  btn.textContent='Saving PDF...';btn.disabled=true;
  html2canvas(el,{backgroundColor:'#0a0618',scale:2,useCORS:true,allowTaint:true,logging:false}).then(canvas=>{
    try{
      const {jsPDF}=window.jspdf;
      const imgData=canvas.toDataURL('image/png');
      const pdfW=210;
      const pdfH=Math.round((canvas.height*pdfW)/canvas.width);
      const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:[pdfW,pdfH]});
      pdf.addImage(imgData,'PNG',0,0,pdfW,pdfH);
      pdf.save(`IssaBookVibe_Journal_${(S.title||'entry').replace(/\s+/g,'_')}.pdf`);
    }catch(e){
      const link=document.createElement('a');
      link.download=`IssaBookVibe_Journal_${(S.title||'entry').replace(/\s+/g,'_')}.pdf`;
      link.href=canvas.toDataURL('image/png');link.click();
    }
    btn.textContent='📄 Save as PDF';btn.disabled=false;
  }).catch(()=>{btn.textContent='📄 Save as PDF';btn.disabled=false;alert('Could not save — try a screenshot!');});
}
window.saveJournal=saveJournal;

  if(S.view==='form'){
    const pills=STEPS.map((s,i)=>`<button onclick="S.step=${i};render()" style="flex-shrink:0;padding:7px 13px;border-radius:20px;border:none;font-family:'DM Sans',sans-serif;background:${i===S.step?'linear-gradient(135deg,#7e22ce,#be185d)':i<S.step?'rgba(74,222,128,0.17)':'rgba(255,255,255,0.06)'};color:${i===S.step?'#fff':i<S.step?'#4ade80':'#9ca3af'};font-size:11px;font-weight:${i===S.step?800:600}">${i<S.step?'✓ ':''}${s}</button>`).join('');
    const prev=S.step>0?`<button onclick="S.step--;render()" style="flex:1;padding:13px;border-radius:14px;border:1.5px solid rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif">← Back</button>`:'';
    const next=S.step<STEPS.length-1
      ?`<button onclick="S.step++;render()" style="flex:2;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#7e22ce,#be185d);color:#fff;font-size:14px;font-weight:800;font-family:'DM Sans',sans-serif">Next: ${STEPS[S.step+1]} →</button>`
      :`<button onclick="S.view='result';sendToSheets();render()" style="flex:2;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#15803d,#7e22ce);color:#fff;font-size:14px;font-weight:800;font-family:'DM Sans',sans-serif;box-shadow:0 0 20px rgba(74,222,128,0.28)">✨ Generate My Journal ✨</button>`;
    body=`
      <div style="display:flex;gap:5px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px">${pills}</div>
      <div class="scard">${stepHTML()}</div>
      <div style="display:flex;gap:10px">${prev}${next}</div>
      <div class="privacy-note">Anonymous usage data helps us improve the app 💜</div>`;
  } else {
    body=`
      ${journalPage()}
      <button id="savePdfBtn" onclick="saveJournal()" style="width:100%;margin-top:14px;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#1d4ed8,#7e22ce);color:#fff;font-size:14px;font-weight:800;font-family:'DM Sans',sans-serif;box-shadow:0 0 18px rgba(99,102,241,0.3)">📄 Save as PDF</button>
      <button onclick="S.view='form';S.step=0;render()" style="width:100%;margin-top:8px;padding:13px;border-radius:14px;border:1.5px solid rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif">← Log Another Book</button>
      <div class="privacy-note">Anonymous usage data helps us improve the app 💜</div>`;
  }
  document.getElementById('app').innerHTML=header+`<div style="max-width:480px;margin:0 auto;padding:18px 16px">${body}</div>`;
}
window.render=render;
render();
</script>
</body>
</html>
