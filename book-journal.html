<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IssaBookVibe — Book Journal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#0a0618 0%,#130826 55%,#091508 100%);font-family:'DM Sans',sans-serif;color:#f3e8ff;padding-bottom:80px}
input[type=text],input[type=date],textarea,select{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(196,181,253,0.3);border-radius:12px;padding:11px 14px;color:#f3e8ff;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;appearance:none}
input[type=text]::placeholder,textarea::placeholder{color:#6b7280}
input[type=text]:focus,textarea:focus,select:focus,input[type=date]:focus{border-color:#c084fc}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
input[type=file]{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(196,181,253,0.3);border-radius:12px;padding:10px 14px;color:#c4b5fd;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
input[type=file]::file-selector-button{background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.3);border-radius:8px;color:#c084fc;padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-right:8px}
textarea{resize:vertical;min-height:80px}
select option{background:#1e1b4b;color:#f3e8ff}
button{cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(192,132,252,0.4);border-radius:4px}
.chip{display:inline-flex;align-items:center;padding:6px 13px;border-radius:20px;border:2px solid #4a4a6a;background:rgba(255,255,255,0.05);color:#c4b5fd;font-size:12px;font-weight:600;cursor:pointer;margin:3px;transition:all 0.18s}
.chip.on{border-color:#c084fc;background:linear-gradient(135deg,#7e22ce,#be185d);color:#fff;font-weight:700}
.chip.emoji{font-size:19px;padding:5px 8px;border-radius:10px}
.slabel{color:#c4b5fd;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:16px;margin-bottom:7px;display:block}
.scard{background:rgba(255,255,255,0.03);border-radius:18px;padding:18px;border:1px solid rgba(192,132,252,0.12);margin-bottom:12px}
.listopt{padding:10px 15px;border-radius:11px;margin-bottom:5px;cursor:pointer;border:1.5px solid rgba(196,181,253,0.18);color:#c4b5fd;font-size:13px;background:rgba(255,255,255,0.04);transition:all 0.2s}
.listopt.spice.on{background:linear-gradient(135deg,rgba(239,68,68,0.28),rgba(126,34,206,0.28));border-color:#ef4444;color:#fca5a5;font-weight:700}
.listopt.ending.on{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(6,95,70,0.18));border-color:#4ade80;color:#4ade80;font-weight:700}
.listopt.fvc.on{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(192,132,252,0.18));border-color:#4ade80;color:#4ade80;font-weight:700}
.char-head{font-size:14px;font-weight:800;margin:18px 0 12px;padding:9px 13px;border-radius:12px}
.star-table{width:100%;border-collapse:separate;border-spacing:0;margin-top:8px}
.star-table th{color:#9ca3af;font-size:11px;font-weight:600;padding:7px 5px;text-align:center}
.star-table th:first-child{text-align:left;padding-left:0}
.star-table td{padding:8px 5px;text-align:center;border-top:1px solid rgba(196,181,253,0.08)}
.star-table td:first-child{color:#e9d5ff;font-size:13px;text-align:left;font-weight:500;padding-left:0}
.star-cell{font-size:17px;cursor:pointer;transition:filter 0.15s;display:inline-block}
.star-cell.off{filter:saturate(0) opacity(0.25)}
.star-cell.on{filter:saturate(1)}
.optional-tag{font-size:10px;color:#6b7280;font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATA ──────────────────────────────────────────────────────────
const DATA={
  authorVibes:['New To Me','Still On The Fence','Enjoy Their Work','One of My Faves'],
  format:['E-Book','Paperback','Hardcover','Other'],
  source:['Kindle/Kindle Unlimited','Bookstore','Library/Libby/Hoopla','Other'],
  pov:['First Person','Third Person','Both'],
  itsGiving:['Love of My Life','Can We Be Lovers & Friends','Twin Flames/Soul Ties','We Belong Together','If Spinning The Block Was A Couple','Torn Between The Two','Toxic AF','Sneaky Links/Secret Lovers','#RelationshipGoals','Certified Freaks','In Love With Another Man/Woman','Good Girl/Daddy Dynamic','Travel/Vacation/Getaway','Revenge/Lick Back','Half On A Baby, Surprise','Never Playing About You','Soft Life/Life of Luxury','Millenial Coded/Nostalgic','Work Baes','Sleeping with The Enemy','For the Grown & Sexy','Money, Power, & Respect','03 Bonnie & Clyde','I Fell for My Best Friend/Ex Sibling','The Boy Is Mine','Everything You Own in a Box to The Left','Take Love Slowly',"If Loving You is Wrong, I Don't Wanna Be Right",'Locked & Loaded','Fake Love, Do It for The Gram','Why You So Obsessed with Me'],
  triggerWarnings:['Domestic Violence/Abuse','Sexual Assault/Rape','Addiction/Substance Abuse','Suicide/Self Harm','Mental Illness/Disorders','Disability/Sickness','Miscarriage/Infertility','Loss/Grief','Societal Issues','Graphic Details','Tragedy/Death','Other','N/A'],
  fmcVibes:['Material Girl/Bad & Boujee','Totally Relatable','Career Driven/Boss Babe','Quirky/Socially Awkward/Neurodivergent',"Little Miss Independent/I Don't Need a Man",'Lover Girl/Hopeless Romantic','Girl Next Door/Average/Sweetheart','Friend In My Head/Girls-Girl','Big Main Character Energy','Good Girl Gone Bad/Villain Era','She IS The DRAMA','A Little Delulu/Cray Cray','Not Likable/Annoying AF',"A Hot Mess but I'ma Stick Beside Her",'Other'],
  mmcVibes:["He's A Good Man Savannah",'BDE/Major Zaddy Vibes','Certified Bookbae/My Type','He Got Money/Big Boss Energy','Unhinged And I Like It','Walking Red Flag/Fuck Boy','Quirky/Socially Awkward/Neurodivergent','Nonchalant/Chill/Laidback','Blunt/DGAF/No Filter','Corny AF/Lame',"Doesn't Do It for Me/Not Likable",'Other'],
  spice:['🚪 Closed-Door Romance','🫦 Flirty and Sweet','🤤 A Little Drool Worthy','🌶️ Spicy AF','💦 NSFW (Not Safe For Work)','🥵 Complete Smut No Plot'],
  plotHadMe:['IKYFL','I Was Rooting For You','Ooop','Biitttch',"I Know That's Right","I Can't",'That Escalated Quickly',"Don't Piss Me Off",'Clutching My Pearls','Gagged','Is The Plot In the Room With Us?','This is The Scheme That Todd Set-up'],
  thatEnding:['Cliffhanger','Felt Rushed','It Was Perfect','Had Me Wanting More',"It Was Aight, Could've Been Better",'WTF Was That','I Could Have Had a V8'],
  theFeels:['😊','🥰','😍','😆','🤣','😏','😬','😅','🤭','🫣','😒','🙄','🤔','🤨','😑','🫠','🥴','😳','😮','🫨','🤯','😠','🤬','😤','😕','😔','😫','😭','🥹','😢','💔','😰','😱','😮\u200d💨','🥱','🎢'],
  finalVibe:['Not My Vibe','DNF (Did Not Finish)','Almost DNF','Hated It','Overhyped','It Was OK','I Enjoyed It',"I Couldn't Get Enough",'Loved It','Top 10 Favorite List','Favorite Book Of All Time','Would Not Recommend','Would Totally Recommend','Memorable','Not Very Memorable','Realistic/Relatable','Unrealistic/Unrelatable','Totally My Vibe']
};

const STEPS=['📖 The Book',"✨ It's Giving",'👥 Characters','💬 The Verdict'];

let S={
  step:0, view:'form',
  title:'', author:'', coverDataUrl:'',
  authorVibe:'', format:'', source:'',
  dateStart:'', dateEnd:'', length:'', series:'', pov:'', setting:'', premise:'',
  vibeEmojis:'',
  itsGiving:[], themeSong:'', memeDataUrl:'', triggerWarnings:[], gagMoment:'',
  fmcName:'', fmcVibe:[],
  mmcName:'', mmcVibe:[],
  secondaryChars:'',
  spice:'', plotHadMe:'', thatEnding:'',
  overview:'', qtna:'',
  starWriting:0, starPace:0, starCharDev:0, starUniverse:0, starEase:0, starOverall:0,
  theFeels:[], finalVibe:[], readingVibe:''
};
window.S=S;

function upd(){render()}
function toggle1(k,v){S[k]=S[k]===v?'':v;upd()}
function toggleN(k,v,max){
  const a=S[k];
  if(a.includes(v)){S[k]=a.filter(x=>x!==v)}
  else if(!max||a.length<max){S[k]=[...a,v]}
  upd();
}
function setStar(k,v){S[k]=S[k]===v?0:v;upd()}
window.toggle1=toggle1;window.toggleN=toggleN;window.setStar=setStar;

function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function lbl(t,opt){return `<span class="slabel">${t}${opt?`<span class="optional-tag">(optional)</span>`:''}</span>`}
function count(k,max){return `<div style="font-size:11px;color:#9ca3af;margin-bottom:7px">${S[k].length}/${max} selected</div>`}

function handleCover(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{S.coverDataUrl=e.target.result;upd()};
  reader.readAsDataURL(file);
}
function handleMeme(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{S.memeDataUrl=e.target.result;upd()};
  reader.readAsDataURL(file);
}
window.handleCover=handleCover;
window.handleMeme=handleMeme;

function chipSet(k,opts,max){
  return `<div style="display:flex;flex-wrap:wrap">${opts.map(o=>{
    const on=Array.isArray(S[k])?S[k].includes(o):S[k]===o;
    const fn=Array.isArray(S[k])?`toggleN('${k}','${esc(o)}',${max||99})`:`toggle1('${k}','${esc(o)}')`;
    return `<span class="chip ${on?'on':''}" onclick="${fn}">${o}</span>`;
  }).join('')}</div>`;
}
function listOpts(k,opts,cls){
  return opts.map(o=>`<div class="listopt ${cls} ${S[k]===o?'on':''}" onclick="toggle1('${k}','${esc(o)}')">${o}</div>`).join('');
}
function selOpts(k,opts,placeholder){
  return `<select onchange="S['${k}']=this.value;upd()"><option value="">${placeholder}</option>${opts.map(o=>`<option value="${esc(o)}" ${S[k]===o?'selected':''}>${o}</option>`).join('')}</select>`;
}
function starRow(label,key){
  const v=S[key];
  return `<tr><td>${label}</td>${[1,2,3,4,5].map(n=>`<td><span class="star-cell ${n<=v?'on':'off'}" onclick="setStar('${key}',${n})">⭐</span></td>`).join('')}</tr>`;
}
function inp(k,placeholder,multiline=false,rows=2){
  if(multiline) return `<textarea placeholder="${placeholder}" oninput="S['${k}']=this.value" rows="${rows}">${S[k]||''}</textarea>`;
  return `<input type="text" placeholder="${placeholder}" value="${esc(S[k]||'')}" oninput="S['${k}']=this.value"/>`;
}

// ── STEPS ─────────────────────────────────────────────────────────
function stepHTML(){
  if(S.step===0) return `
    ${lbl('Title *')}${inp('title','What are we reading?')}
    ${lbl('Author *')}${inp('author','Who wrote it?')}
    ${lbl('Author Vibes (choose 1)')}${chipSet('authorVibe',DATA.authorVibes)}
    ${lbl('Format (choose 1)')}${chipSet('format',DATA.format)}
    ${lbl('Source (choose 1)')}${chipSet('source',DATA.source)}
    ${lbl('Book Cover',true)}
    ${S.coverDataUrl?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <img src="${S.coverDataUrl}" style="width:55px;height:75px;object-fit:cover;border-radius:8px;border:2px solid rgba(192,132,252,0.4)"/>
      <button onclick="S.coverDataUrl='';upd()" style="padding:5px 12px;border-radius:9px;border:1.5px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);color:#fca5a5;font-size:12px;font-weight:700">Remove</button>
    </div>`:''}
    <input type="file" accept="image/*" onchange="handleCover(this)"/>
    ${lbl('Date Started *')}<input type="date" value="${S.dateStart||''}" onchange="S.dateStart=this.value;upd()" style="color:${S.dateStart?'#f3e8ff':'#6b7280'}"/>
    ${lbl('Date Finished',true)}<input type="date" value="${S.dateEnd||''}" onchange="S.dateEnd=this.value;upd()" style="color:${S.dateEnd?'#f3e8ff':'#6b7280'}"/>
    <div style="font-size:11px;color:#6b7280;margin-top:4px">Leave blank if you haven't finished yet</div>
    ${lbl('Length (pages) *')}${inp('length','How many pages?')}
    ${lbl('Series *')}${inp('series','Series name & book number, or N/A')}
    ${lbl('POV (choose 1)')}${selOpts('pov',DATA.pov,'Select POV...')}
    ${lbl('Setting *')}${inp('setting','Main location / time period')}
    ${lbl('Premise / Blurb *')}${inp('premise','The rundown — spoil it or keep it cute',true,3)}
    ${lbl('Emojis That Represent The Overall Vibe (up to 3)')}
    <input type="text" placeholder="Type or paste up to 3 emojis ✨🔥💀" value="${esc(S.vibeEmojis||'')}" oninput="S.vibeEmojis=this.value" style="font-size:22px;letter-spacing:6px"/>`;

  if(S.step===1) return `
    ${lbl("It's Giving... (up to 5)")}${count('itsGiving',5)}${chipSet('itsGiving',DATA.itsGiving,5)}
    ${lbl('Spice Factor (choose 1)')}${listOpts('spice',DATA.spice,'spice')}
    ${lbl('Trigger Warnings? (select all that apply)')}${chipSet('triggerWarnings',DATA.triggerWarnings,99)}
    ${lbl('Theme Song',true)}${inp('themeSong','What song was playing in your head?')}
    ${lbl('Meme or GIF to Describe The Vibe',true)}
    ${S.memeDataUrl?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <img src="${S.memeDataUrl}" style="width:80px;height:60px;object-fit:cover;border-radius:8px;border:2px solid rgba(192,132,252,0.4)"/>
      <button onclick="S.memeDataUrl='';upd()" style="padding:5px 12px;border-radius:9px;border:1.5px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);color:#fca5a5;font-size:12px;font-weight:700">Remove</button>
    </div>`:''}
    <input type="file" accept="image/*" onchange="handleMeme(this)"/>
    ${lbl('Most Gag-Worthy Moment / Favorite Quotes',true)}${inp('gagMoment','The moment you had to put the book down',true,3)}`;

  if(S.step===2) return `
    <div class="char-head" style="background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.25);color:#f9a8d4">She's That Girl — FMC</div>
    ${lbl('FMC Name / Age / Occupation *')}${inp('fmcName','e.g. Maya, 28, ER Nurse')}
    ${lbl('FMC Vibe (up to 3)')}${count('fmcVibe',3)}${chipSet('fmcVibe',DATA.fmcVibes,3)}

    <div class="char-head" style="background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);color:#c084fc;margin-top:8px">He's That Dude — MMC</div>
    ${lbl('MMC Name / Age / Occupation *')}${inp('mmcName','e.g. Damien, 32, CEO / Menace')}
    ${lbl('MMC Vibe (up to 3)')}${count('mmcVibe',3)}${chipSet('mmcVibe',DATA.mmcVibes,3)}

    <div style="margin-top:16px">${lbl('Secondary Characters',true)}${inp('secondaryChars','List character names and their role in the story',true,3)}</div>`;

  if(S.step===3) return `
    ${lbl('The Plot Had Me Like... (choose 1)')}${chipSet('plotHadMe',DATA.plotHadMe)}
    <div style="margin-top:14px">${lbl('That Ending Tho... (choose 1)')}${listOpts('thatEnding',DATA.thatEnding,'ending')}</div>
    <div style="margin-top:14px">
      ${lbl('The Feels... (up to 3)')}${count('theFeels',3)}
      <div style="display:flex;flex-wrap:wrap;gap:3px">${DATA.theFeels.map(e=>`<span class="chip emoji ${S.theFeels.includes(e)?'on':''}" onclick="toggleN('theFeels','${e}',3)">${e}</span>`).join('')}</div>
    </div>
    <div style="margin-top:14px">
      ${lbl('Analysis ⭐ (tap to rate)')}
      <table class="star-table">
        <thead><tr><th></th><th>⭐</th><th>⭐⭐</th><th>⭐⭐⭐</th><th>⭐⭐⭐⭐</th><th>⭐⭐⭐⭐⭐</th></tr></thead>
        <tbody>
          ${starRow('Quality of Writing','starWriting')}
          ${starRow('Pace','starPace')}
          ${starRow('Character Dev','starCharDev')}
          ${starRow('Universe Dev','starUniverse')}
          ${starRow('Ease of Reading','starEase')}
          ${starRow('Overall Rating','starOverall')}
        </tbody>
      </table>
    </div>
    <div style="margin-top:14px">${lbl('Overview / Takeaway',true)}${inp('overview','Say what you gotta say, bestie',true,3)}</div>
    <div style="margin-top:14px">${lbl("QTNA's / Comments",true)}${inp('qtna','Questions that need answers… or just unhinged thoughts',true,2)}</div>
    <div style="margin-top:14px">${lbl('What Was Your Reading Vibe?',true)}${inp('readingVibe','Cozy in bed? At a coffee shop? Crying on the train?')}</div>
    <div style="margin-top:14px">
      ${lbl('Final Vibe Check (up to 3)')}${count('finalVibe',3)}
      ${DATA.finalVibe.map(v=>`<div class="listopt fvc ${S.finalVibe.includes(v)?'on':''}" onclick="toggleN('finalVibe','${esc(v)}',3)">${v}</div>`).join('')}
    </div>`;
}

// ── PDF JOURNAL PAGE ──────────────────────────────────────────────
function journalPage(){
  const ve=S.vibeEmojis||'';
  function block(label,val,color='#c4b5fd'){
    return val?`<div style="margin-bottom:12px">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${color};margin-bottom:5px;font-family:'DM Sans',sans-serif">${label}</div>
      <div style="color:#f3e8ff;font-size:13px;font-family:'DM Sans',sans-serif;line-height:1.6">${val}</div>
    </div>`:'';
  }
  function tags(arr,color,bg){
    return arr.length?`<div style="display:flex;flex-wrap:wrap;gap:5px">${arr.map(v=>`<span style="background:${bg};border:1px solid ${color}55;color:${color};border-radius:9px;padding:3px 10px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif">${v}</span>`).join('')}</div>`:'-';
  }
  function sec(title,color,body){
    return `<div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(196,181,253,0.1)">
      <div style="color:${color};font-size:13px;font-weight:800;margin-bottom:12px;padding:6px 12px;background:${color}18;border-radius:8px;display:inline-block;font-family:'DM Sans',sans-serif">${title}</div>
      <div>${body}</div>
    </div>`;
  }
  function row(label,val){
    return val?`<div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start">
      <span style="color:#9ca3af;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;min-width:90px;flex-shrink:0;padding-top:1px;font-family:'DM Sans',sans-serif">${label}</span>
      <span style="color:#f3e8ff;font-size:13px;flex:1;font-family:'DM Sans',sans-serif;line-height:1.5">${val}</span>
    </div>`:'';
  }
  function starDisplay(label,val){
    return val>0?`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(196,181,253,0.07)">
      <span style="color:#e9d5ff;font-size:12px;font-family:'DM Sans',sans-serif">${label}</span>
      <span style="font-size:14px">${'⭐'.repeat(val)}</span>
    </div>`:'';
  }

  return `<div id="journalPage" style="background:linear-gradient(160deg,#0f0a1e,#1a0533 50%,#0d1a0d);max-width:480px;margin:0 auto;padding:28px 22px;border-radius:20px;border:1px solid rgba(192,132,252,0.2)">

    <!-- HEADER -->
    <div style="text-align:center;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid rgba(192,132,252,0.2)">
      <div style="display:inline-flex;align-items:center;background:#000;padding:5px 12px;border-radius:9px;border:1.5px solid rgba(192,132,252,0.35);margin-bottom:8px">
        <span style="color:#fff;font-size:13px;font-weight:900;font-family:'DM Sans',sans-serif">Issa</span>
        <span style="color:#f9a8d4;font-size:13px;font-weight:800;font-style:italic;margin-left:2px;font-family:'DM Sans',sans-serif">Book</span>
        <span style="color:#4ade80;font-size:13px;font-weight:900;letter-spacing:1px;margin-left:3px;font-family:'DM Sans',sans-serif">VIBE</span>
      </div>
      <div style="font-size:8px;color:#a78bfa;letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;font-family:'DM Sans',sans-serif">book journal</div>

      <!-- Title + Cover -->
      <div style="display:flex;gap:14px;align-items:flex-start;text-align:left">
        <div style="width:70px;height:95px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#7e22ce,#be185d);display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid rgba(192,132,252,0.4);box-shadow:3px 3px 14px rgba(0,0,0,0.5)">
          ${S.coverDataUrl?`<img src="${S.coverDataUrl}" style="width:100%;height:100%;object-fit:cover"/>`:'<span style="font-size:22px">📚</span>'}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:20px;font-weight:800;color:#f3e8ff;line-height:1.25;margin-bottom:4px;font-family:'DM Sans',sans-serif">${S.title||'—'}</div>

    ${sec('👥 The Characters','#4ade80',
      (S.fmcName?`<div style="background:rgba(236,72,153,0.07);border:1px solid rgba(236,72,153,0.2);border-radius:12px;padding:11px;margin-bottom:10px">

        ${S.fmcVibe.length?`<div>${tags(S.fmcVibe,'#f9a8d4','rgba(236,72,153,0.09)')}</div>`:''}
      </div>`:'')+

    )}

    <!-- THE VERDICT -->
    ${sec('💬 The Verdict','#fbbf24',
      (S.plotHadMe?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div style="background:rgba(255,255,255,0.04);border-radius:9px;padding:9px;text-align:center">

        <div style="color:#fbbf24;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:'DM Sans',sans-serif">⭐ Analysis</div>
        ${starDisplay('Quality of Writing',S.starWriting)}
        ${starDisplay('Pace',S.starPace)}
        ${starDisplay('Character Development',S.starCharDev)}
        ${starDisplay('Universe Development',S.starUniverse)}
        ${starDisplay('Ease of Reading',S.starEase)}
        ${S.starOverall?`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid rgba(251,191,36,0.2);margin-top:4px">

          <span style="font-size:16px">${'⭐'.repeat(S.starOverall)}</span>

      </div>`:'')+
      (S.overview?`<div style="padding:11px;background:rgba(255,255,255,0.04);border-radius:10px;border-left:3px solid #fbbf24;margin-bottom:10px">
        <div style="color:#9ca3af;font-size:9px;text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;font-family:'DM Sans',sans-serif">Overview / Takeaway</div>
        <div style="color:#e9d5ff;font-size:12px;font-family:'DM Sans',sans-serif;line-height:1.6;font-style:italic">"${S.overview}"</div>
      </div>`:'')+
      (S.qtna?`<div style="padding:11px;background:rgba(255,255,255,0.04);border-radius:10px;border-left:3px solid #a78bfa;margin-bottom:10px">
        <div style="color:#9ca3af;font-size:9px;text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;font-family:'DM Sans',sans-serif">QTNAs / Comments</div>
        <div style="color:#e9d5ff;font-size:12px;font-family:'DM Sans',sans-serif;line-height:1.6">${S.qtna}</div>
      </div>`:'')+
      (S.readingVibe?block('Reading Vibe',S.readingVibe,'#a78bfa'):'')+
      (S.finalVibe.length?`<div style="background:linear-gradient(135deg,rgba(74,222,128,0.11),rgba(192,132,252,0.11));border:1px solid rgba(74,222,128,0.32);border-radius:13px;padding:13px;text-align:center;margin-top:12px">
        <div style="color:#4ade80;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:7px;font-family:'DM Sans',sans-serif">✅ Final Vibe Check</div>
        <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:5px">${S.finalVibe.map(v=>`<span style="background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.38);color:#4ade80;border-radius:9px;padding:4px 11px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif">${v}</span>`).join('')}</div>
      </div>`:'')||'-'
    )}
  </div>`;
}

// ── SAVE AS PDF ───────────────────────────────────────────────────
function saveJournal(){
  const el=document.getElementById('journalPage');
  if(!el){alert('Generate the journal first!');return;}
  const btn=document.getElementById('savePdfBtn');
  btn.textContent='Saving PDF...';btn.disabled=true;
  html2canvas(el,{backgroundColor:'#0a0618',scale:2,useCORS:true,allowTaint:true,logging:false}).then(canvas=>{
    try{
      const {jsPDF}=window.jspdf;
      const imgData=canvas.toDataURL('image/png');
      const pdfW=210;
      const pdfH=Math.round((canvas.height*pdfW)/canvas.width);
      const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:[pdfW,pdfH]});
      pdf.addImage(imgData,'PNG',0,0,pdfW,pdfH);
      pdf.save(`IssaBookVibe_Journal_${(S.title||'entry').replace(/\s+/g,'_')}.pdf`);
    }catch(e){
      const link=document.createElement('a');
      link.download=`IssaBookVibe_Journal_${(S.title||'entry').replace(/\s+/g,'_')}.pdf`;
      link.href=canvas.toDataURL('image/png');link.click();
    }
    btn.textContent='📄 Save as PDF';btn.disabled=false;
  }).catch(()=>{btn.textContent='📄 Save as PDF';btn.disabled=false;alert('Could not save — try a screenshot!');});
}
window.saveJournal=saveJournal;

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  const header=`<div style="background:linear-gradient(90deg,#12042a,#081208);padding:13px 24px;border-bottom:1px solid rgba(192,132,252,0.18);text-align:center;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)">
    <div style="display:inline-flex;align-items:center;background:#000;padding:5px 12px;border-radius:9px;border:1.5px solid rgba(192,132,252,0.3)">
      <span style="color:#fff;font-size:13px;font-weight:900;font-family:'DM Sans',sans-serif">Issa</span>
      <span style="color:#f9a8d4;font-size:13px;font-weight:800;font-style:italic;margin-left:2px;font-family:'DM Sans',sans-serif">Book</span>
      <span style="color:#4ade80;font-size:13px;font-weight:900;letter-spacing:1px;margin-left:3px;font-family:'DM Sans',sans-serif">VIBE</span>
    </div>
    <div style="font-size:8px;color:#a78bfa;letter-spacing:4px;text-transform:uppercase;margin-top:3px;font-family:'DM Sans',sans-serif">book journal</div>
  </div>`;

  let body='';
  if(S.view==='form'){
    const pills=STEPS.map((s,i)=>`<button onclick="S.step=${i};render()" style="flex-shrink:0;padding:7px 13px;border-radius:20px;border:none;font-family:'DM Sans',sans-serif;background:${i===S.step?'linear-gradient(135deg,#7e22ce,#be185d)':i<S.step?'rgba(74,222,128,0.17)':'rgba(255,255,255,0.06)'};color:${i===S.step?'#fff':i<S.step?'#4ade80':'#9ca3af'};font-size:11px;font-weight:${i===S.step?800:600}">${i<S.step?'✓ ':''}${s}</button>`).join('');
    const prev=S.step>0?`<button onclick="S.step--;render()" style="flex:1;padding:13px;border-radius:14px;border:1.5px solid rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif">← Back</button>`:'';
    const next=S.step<STEPS.length-1
      ?`<button onclick="S.step++;render()" style="flex:2;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#7e22ce,#be185d);color:#fff;font-size:14px;font-weight:800;font-family:'DM Sans',sans-serif">Next: ${STEPS[S.step+1]} →</button>`
      :`<button onclick="S.view='result';render()" style="flex:2;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#15803d,#7e22ce);color:#fff;font-size:14px;font-weight:800;font-family:'DM Sans',sans-serif;box-shadow:0 0 20px rgba(74,222,128,0.28)">✨ Generate My Journal ✨</button>`;
    body=`
      <div style="display:flex;gap:5px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px">${pills}</div>
      <div class="scard">${stepHTML()}</div>
      <div style="display:flex;gap:10px">${prev}${next}</div>`;
  } else {
    body=`
      ${journalPage()}
      <button id="savePdfBtn" onclick="saveJournal()" style="width:100%;margin-top:14px;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#1d4ed8,#7e22ce);color:#fff;font-size:14px;font-weight:800;font-family:'DM Sans',sans-serif;box-shadow:0 0 18px rgba(99,102,241,0.3)">📄 Save as PDF</button>
      <button onclick="S.view='form';S.step=0;render()" style="width:100%;margin-top:8px;padding:13px;border-radius:14px;border:1.5px solid rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif">← Log Another Book</button>`;
  }
  document.getElementById('app').innerHTML=header+`<div style="max-width:480px;margin:0 auto;padding:18px 16px">${body}</div>`;
}
window.render=render;
render();
</script>
