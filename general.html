<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IssaBookVibe — Book Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#0a0618 0%,#130826 55%,#091508 100%);font-family:'DM Sans',sans-serif;color:#f3e8ff;padding-bottom:60px}
input[type=text],input[type=file]{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(196,181,253,0.3);border-radius:12px;padding:12px 16px;color:#f3e8ff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
input[type=text]::placeholder{color:#6b7280}
input[type=text]:focus{border-color:#c084fc}
input[type=file]{padding:10px 14px;cursor:pointer;color:#c4b5fd}
input[type=file]::file-selector-button{background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.3);border-radius:8px;color:#c084fc;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-right:10px}
button{cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(192,132,252,0.4);border-radius:4px}
.chip{display:inline-flex;align-items:center;padding:7px 14px;border-radius:20px;border:2px solid #4a4a6a;background:rgba(255,255,255,0.05);color:#c4b5fd;font-size:12px;font-weight:600;cursor:pointer;margin:3px;transition:all 0.18s}
.chip.on{border-color:#c084fc;background:linear-gradient(135deg,#7e22ce,#be185d);color:#fff;font-weight:700}
.slabel{color:#c4b5fd;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:18px;margin-bottom:8px}
.scard{background:rgba(255,255,255,0.03);border-radius:18px;padding:20px;border:1px solid rgba(192,132,252,0.12);margin-bottom:14px}
.listopt{padding:11px 16px;border-radius:11px;margin-bottom:6px;cursor:pointer;border:1.5px solid rgba(196,181,253,0.18);color:#c4b5fd;font-size:13px;background:rgba(255,255,255,0.04);transition:all 0.2s;font-family:'DM Sans',sans-serif}
.listopt.spice.on{background:linear-gradient(135deg,rgba(239,68,68,0.28),rgba(126,34,206,0.28));border-color:#ef4444;color:#fca5a5;font-weight:700}
.listopt.ending.on{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(6,95,70,0.18));border-color:#4ade80;color:#4ade80;font-weight:700}
.listopt.fvc.on{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(192,132,252,0.18));border-color:#4ade80;color:#4ade80;font-weight:700}
.char-section-head{font-size:14px;font-weight:800;margin:20px 0 14px;padding:10px 14px;border-radius:12px;letter-spacing:0}
.add-char-btn{width:100%;padding:14px;border-radius:14px;border:1.5px dashed rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;margin-bottom:10px;transition:all 0.2s}
.add-char-btn:hover{border-color:#c084fc;color:#e9d5ff}
.char-card{background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid rgba(192,132,252,0.18)}
.char-card.fmc{border-left:3px solid #f9a8d4}
.char-card.mmc{border-left:3px solid #c084fc}
.remove-char-btn{float:right;background:transparent;border:none;color:#fca5a5;font-size:16px;cursor:pointer;padding:0;line-height:1}
.privacy-note{text-align:center;color:#6b7280;font-size:10px;margin-top:24px;padding:12px;line-height:1.5;font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SHEETS_WEBHOOK_URL = 'PASTE_YOUR_WEB_APP_URL_HERE';
 
const DATA={
  authorVibes:['New To Me','Still On The Fence','Enjoy Their Work','One of My Faves','Not My Vibe'],
  format:['E-Book','Paperback','Audiobook','Hardcover','Other'],
  itsGiving:['Can We Be Lovers & Friends','Twin Flames/Soul Ties','They Belong Together Fr','If Spinning The Block Was A Couple','Torn Between The Two','Toxic AF','Sneaky Links/Secret Lovers','#RelationshipGoals','Certified Freaks','In Love With Another Man/Woman','Good Girl/Daddy Dynamic','Travel/Vacation/Getaway','Revenge/Lick Back','Half On A Baby, Surprise','Never Playing About You','Soft Life/Life of Luxury','Millenial Coded/Nostalgic','Work Baes','Sleeping with The Enemy','For the Grown & Sexy','Money, Power, & Respect','03 Bonnie & Clyde','I Fell for My Best Friend/Ex Sibling','The Boy Is Mine','Everything You Own in a Box to The Left','Take Love Slowly',"If Loving You is Wrong, I Don't Wanna Be Right",'Locked & Loaded','Fake Love, Do It for The Gram','Why You So Obsessed with Me',"Age Ain't Nothing But A Number",'You, Me, and Them/Why Choose','Sweetest Taboo','A Tyler Perry/Tubi Movie','He Fell First'],
  fmc:['Material Girl/Bad & Boujee/Rich Auntie','Totally Relatable','Career Driven/Boss Babe','Quirky/Socially Awkward/Neurodivergent',"Little Miss Independent/I Don't Need a Man",'Lover Girl/Hopeless Romantic','Girl Next Door/Sweetheart','Average/Basic','Friend In My Head/Girls-Girl','Big Main Character Energy','Good Girl Gone Bad/Villain Era','She IS The DRAMA','A Little Delulu/Cray Cray','She About That Life','Not Likable/Annoying AF','Mean Girl','A Hoe Lotta Fun',"A Hot Mess but I'ma Stick Beside Her",'Blunt/DGAF/No Filter','Other'],
  mmc:["He's A Good Man Savannah",'BDE/Major Zaddy Vibes','Certified Bookbae/My Type IRL','He Got Money/Big Boss Energy','Unhinged And I Like It','Walking Red Flag/Fuck Boy','Quirky/Socially Awkward/Neurodivergent','Nonchalant/Chill/Laidback','Romantic/Loverboy','Mr. Steal Your Girl','Blunt/DGAF/No Filter','Corny AF/Lame',"Doesn't Do It for Me/Not Likable",'Other'],
  spice:['🚪 Closed-Door Romance','🫦 Flirty and Sweet','🤤 A Little Drool Worthy','🌶️ Spicy AF','💦 NSFW (Not Safe For Work)','🥵 Complete Smut No Plot'],
  plotHadMe:['IKYFL','I Was Rooting For You','Ooop','Biitttch',"I Know That's Right","I Can't",'That Escalated Quickly',"Don't Piss Me Off",'Clutching My Pearls','Gagged','Is The Plot In the Room With Us?','This is The Scheme That Todd Set-up','Not Me Crying','I Have No Words','Clock That Tea'],
  thatEnding:['Cliffhanger','Felt Rushed','It Works','Happily Ever After or Whatever','Had Me Wanting More',"It Was Aight, Could've Been Better",'WTF Was That','I Could Have Had a V8'],
  finalVibe:['Not My Vibe','DNF (Did Not Finish)','Almost DNF','Hated It','Overhyped','It Was OK','I Enjoyed It',"I Couldn't Get Enough",'Loved It','Top 10 Favorite List','Favorite Book Of All Time','Would Not Recommend','Would Totally Recommend','Memorable','Not Very Memorable','Realistic/Relatable','Unrealistic/Unrelatable','Totally My Vibe']
};
 
const STEPS=['📖 The Book',"✨ It's Giving",'👥 Characters','💬 The Verdict'];
 
let S={
  step:0,view:'form',tab:'card',
  title:'',author:'',coverDataUrl:'',
  vibeEmojis:'',authorVibe:'',format:'',
  itsGiving:[],
  fmcAdded:false, fmcName:'', fmcVibe:[],
  mmcAdded:false, mmcName:'', mmcVibe:[],
  spice:'',plotHadMe:'',thatEnding:'',
  finalVibe:[]
};
window.S=S;
 
function upd(){render()}
function toggle1(k,v){S[k]=S[k]===v?'':v;upd()}
function toggleN(k,v,max){
  const a=S[k];
  if(a.includes(v)){S[k]=a.filter(x=>x!==v)}
  else if(!max||a.length<max){S[k]=[...a,v]}
  upd();
}
function addChar(key){S[key+'Added']=true;upd()}
function removeChar(key){
  S[key+'Added']=false;
  S[key+'Name']='';
  S[key+'Vibe']=[];
  upd();
}
window.toggle1=toggle1;window.toggleN=toggleN;window.addChar=addChar;window.removeChar=removeChar;
 
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function lbl(t){return `<div class="slabel">${t}</div>`}
function count(k,max){return `<div style="font-size:11px;color:#9ca3af;margin-bottom:8px">${S[k].length}/${max} selected</div>`}
 
function handleCover(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{S.coverDataUrl=e.target.result;upd()};
  reader.readAsDataURL(file);
}
window.handleCover=handleCover;
 
function chipSet(k,opts,max){
  return `<div style="display:flex;flex-wrap:wrap">${opts.map(o=>{
    const on=Array.isArray(S[k])?S[k].includes(o):S[k]===o;
    const fn=Array.isArray(S[k])?`toggleN('${k}','${esc(o)}',${max||99})`:`toggle1('${k}','${esc(o)}')`;
    return `<span class="chip ${on?'on':''}" onclick="${fn}">${o}</span>`;
  }).join('')}</div>`;
}
function listOpts(k,opts,cls){
  return opts.map(o=>`<div class="listopt ${cls} ${S[k]===o?'on':''}" onclick="toggle1('${k}','${esc(o)}')">${o}</div>`).join('');
}
 
function charCard(key, label, color, vibesList){
  if(!S[key+'Added']){
    return `<button class="add-char-btn" onclick="addChar('${key}')">+ Add ${label}</button>`;
  }
  return `<div class="char-card ${key}">
    <div class="char-section-head" style="background:${color}1a;border:1px solid ${color}40;color:${color};margin:0 0 12px">
      ${label}
      <button class="remove-char-btn" onclick="removeChar('${key}')">✕</button>
    </div>
    ${lbl(`${label} Name`)}
    <input type="text" placeholder="Character name (optional)" value="${esc(S[key+'Name']||'')}" oninput="S['${key}Name']=this.value"/>
    ${lbl(`${label} Vibe (up to 3)`)}${count(key+'Vibe',3)}
    ${chipSet(key+'Vibe',vibesList,3)}
  </div>`;
}
 
function stepHTML(){
  if(S.step===0) return `
    ${lbl('Title *')}
    <input type="text" placeholder="What are we reading?" value="${esc(S.title)}" oninput="S.title=this.value"/>
    ${lbl('Author *')}
    <input type="text" placeholder="Who wrote it?" value="${esc(S.author)}" oninput="S.author=this.value"/>
    ${lbl('Author Vibes (choose 1)')}${chipSet('authorVibe',DATA.authorVibes)}
    ${lbl('Format (choose 1)')}${chipSet('format',DATA.format)}
    ${lbl('Book Cover (optional)')}
    ${S.coverDataUrl
      ?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
           <img src="${S.coverDataUrl}" style="width:60px;height:80px;object-fit:cover;border-radius:8px;border:2px solid rgba(192,132,252,0.4)"/>
           <button onclick="S.coverDataUrl='';upd()" style="padding:6px 14px;border-radius:10px;border:1.5px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);color:#fca5a5;font-size:12px;font-weight:700">Remove</button>
         </div>`:''}
    <input type="file" accept="image/*" onchange="handleCover(this)"/>
    ${lbl('The Emoji Vibes (up to 5)')}
    <input type="text" placeholder="Input up to 5 Emojis That Represent The Overall Vibe" value="${esc(S.vibeEmojis)}" oninput="S.vibeEmojis=this.value" style="font-size:22px;letter-spacing:6px"/>`;
 
  if(S.step===1) return `
    ${lbl("It's Giving... (up to 5)")}${count('itsGiving',5)}
    ${chipSet('itsGiving',DATA.itsGiving,5)}
    <div style="margin-top:20px">
      ${lbl('Spice Factor (choose 1)')}
      ${listOpts('spice',DATA.spice,'spice')}
    </div>`;
 
  if(S.step===2) return `
    ${charCard('fmc',"Female Main Character",'#f9a8d4',DATA.fmc)}
    ${charCard('mmc',"Male Main Character",'#c084fc',DATA.mmc)}`;
 
  if(S.step===3) return `
    ${lbl('The Plot Had Me Like... (choose 1)')}
    ${chipSet('plotHadMe',DATA.plotHadMe)}
    <div style="margin-top:16px">
      ${lbl('That Ending Tho... (choose 1)')}
      ${listOpts('thatEnding',DATA.thatEnding,'ending')}
    </div>
    <div style="margin-top:16px">
      ${lbl('Final Vibe Check (up to 3)')}${count('finalVibe',3)}
      ${DATA.finalVibe.map(v=>`<div class="listopt fvc ${S.finalVibe.includes(v)?'on':''}" onclick="toggleN('finalVibe','${esc(v)}',3)">${v}</div>`).join('')}
    </div>`;
}
 
function shareCard(){
  const vibeEmojiStr=Array.isArray(S.vibeEmojis)?S.vibeEmojis.join(''):S.vibeEmojis;
  return `<div id="vibeCard" style="background:linear-gradient(160deg,#0f0a1e,#1a0533 45%,#0d1a0d);border-radius:24px;padding:26px 22px;max-width:420px;margin:0 auto;box-shadow:0 0 50px rgba(192,132,252,0.22),0 0 90px rgba(74,222,128,0.07);border:1px solid rgba(192,132,252,0.22);position:relative;overflow:hidden;font-family:'DM Sans',sans-serif">
    <div style="position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(236,72,153,0.18),transparent 70%);pointer-events:none"></div>
    <div style="position:absolute;bottom:-50px;left:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(74,222,128,0.13),transparent 70%);pointer-events:none"></div>
 
    <div style="text-align:center;margin-bottom:16px">
      <div style="display:inline-flex;align-items:center;background:#000;padding:6px 14px;border-radius:10px;border:2px solid rgba(192,132,252,0.3)">
        <span style="color:#fff;font-size:16px;font-weight:900;font-family:'DM Sans',sans-serif">Issa</span>
        <span style="color:#f9a8d4;font-size:16px;font-weight:800;font-style:italic;margin-left:3px;font-family:'DM Sans',sans-serif">Book</span>
        <span style="color:#4ade80;font-size:16px;font-weight:900;letter-spacing:1px;margin-left:4px;font-family:'DM Sans',sans-serif">VIBE</span>
      </div>
      <div style="font-size:8px;color:#a78bfa;letter-spacing:4px;text-transform:uppercase;margin-top:4px;font-family:'DM Sans',sans-serif">book log</div>
    </div>
 
    <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:16px;padding:14px;background:rgba(255,255,255,0.04);border-radius:16px;border:1px solid rgba(192,132,252,0.16)">
      <div style="width:72px;height:96px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#7e22ce,#be185d);display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid rgba(192,132,252,0.35);box-shadow:3px 3px 14px rgba(0,0,0,0.5)">
        ${S.coverDataUrl?`<img src="${S.coverDataUrl}" style="width:100%;height:100%;object-fit:cover"/>`:'<span style="font-size:24px">📚</span>'}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:17px;font-weight:800;color:#f3e8ff;line-height:1.3;margin-bottom:3px">${S.title||'Book Title'}</div>
        <div style="color:#c084fc;font-size:12px;margin-bottom:8px">by ${S.author||'Author'}</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${S.authorVibe?`<span style="background:rgba(74,222,128,0.13);border:1px solid rgba(74,222,128,0.35);color:#4ade80;border-radius:8px;padding:2px 9px;font-size:10px;font-weight:700">${S.authorVibe}</span>`:''}
          ${S.format?`<span style="background:rgba(167,139,250,0.13);border:1px solid rgba(167,139,250,0.35);color:#a78bfa;border-radius:8px;padding:2px 9px;font-size:10px">📖 ${S.format}</span>`:''}
        </div>
        ${vibeEmojiStr?`<div style="font-size:22px;margin-top:8px;letter-spacing:6px">${vibeEmojiStr}</div>`:''}
      </div>
    </div>
 
    ${S.itsGiving.length?`<div style="margin-bottom:14px">
      <div style="color:#f9a8d4;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;margin-bottom:7px">✨ It's Giving...</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">${S.itsGiving.map(v=>`<span style="background:linear-gradient(135deg,rgba(126,34,206,0.3),rgba(190,24,93,0.3));border:1px solid rgba(192,132,252,0.3);color:#e9d5ff;border-radius:10px;padding:4px 10px;font-size:11px;font-weight:700">${v}</span>`).join('')}</div>
    </div>`:''}
 
    ${S.spice?`<div style="background:rgba(239,68,68,0.09);border:1px solid rgba(239,68,68,0.22);border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:19px">${S.spice.split(' ')[0]}</span>
      <span style="color:#fca5a5;font-size:12px;font-weight:700">${S.spice.replace(/^\S+\s/,'')}</span>
    </div>`:''}
 
    ${(S.fmcAdded&&(S.fmcVibe.length||S.fmcName)) || (S.mmcAdded&&(S.mmcVibe.length||S.mmcName))?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${S.fmcAdded?`<div style="background:rgba(236,72,153,0.07);border:1px solid rgba(236,72,153,0.2);border-radius:12px;padding:10px">
        <div style="color:#f9a8d4;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">She's That Girl</div>
        ${S.fmcName?`<div style="color:#f3e8ff;font-size:12px;font-weight:700;margin-bottom:5px">${S.fmcName}</div>`:''}
        ${S.fmcVibe.length?S.fmcVibe.map(v=>`<div style="color:#f3e8ff;font-size:11px;font-weight:600;margin-bottom:3px">• ${v}</div>`).join(''):'<div style="color:#6b7280;font-size:11px">—</div>'}
      </div>`:'<div></div>'}
      ${S.mmcAdded?`<div style="background:rgba(124,58,237,0.07);border:1px solid rgba(124,58,237,0.2);border-radius:12px;padding:10px">
        <div style="color:#c084fc;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">He's That Dude</div>
        ${S.mmcName?`<div style="color:#f3e8ff;font-size:12px;font-weight:700;margin-bottom:5px">${S.mmcName}</div>`:''}
        ${S.mmcVibe.length?S.mmcVibe.map(v=>`<div style="color:#f3e8ff;font-size:11px;font-weight:600;margin-bottom:3px">• ${v}</div>`).join(''):'<div style="color:#6b7280;font-size:11px">—</div>'}
      </div>`:'<div></div>'}
    </div>`:''}
 
    ${(S.plotHadMe||S.thatEnding)?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      ${S.plotHadMe?`<div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;text-align:center">
        <div style="color:#9ca3af;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">The Plot Had Me Like</div>
        <div style="color:#e9d5ff;font-size:12px;font-weight:700">${S.plotHadMe}</div>
      </div>`:''}
      ${S.thatEnding?`<div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;text-align:center">
        <div style="color:#9ca3af;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">That Ending Tho...</div>
        <div style="color:#e9d5ff;font-size:12px;font-weight:700">${S.thatEnding}</div>
      </div>`:''}
    </div>`:''}
 
    ${S.finalVibe.length?`<div style="background:linear-gradient(135deg,rgba(74,222,128,0.11),rgba(192,132,252,0.11));border:1px solid rgba(74,222,128,0.32);border-radius:14px;padding:14px;text-align:center">
      <div style="color:#4ade80;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px">✅ Final Vibe Check</div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:6px">${S.finalVibe.map(v=>`<span style="background:rgba(74,222,128,0.13);border:1px solid rgba(74,222,128,0.38);color:#4ade80;border-radius:10px;padding:4px 12px;font-size:12px;font-weight:700">${v}</span>`).join('')}</div>
    </div>`:''}
  </div>`;
}
 
function fullLog(){
  const vibeEmojiStr=Array.isArray(S.vibeEmojis)?S.vibeEmojis.join(''):S.vibeEmojis;
  function row(label,val){return val?`<div style="display:flex;gap:8px;margin-bottom:7px"><span style="color:#9ca3af;font-size:12px;min-width:110px;flex-shrink:0">${label}</span><span style="color:#f3e8ff;font-size:12px;flex:1">${val}</span></div>`:''}
  function sec(title,color,body){return body?`<div style="margin-bottom:18px"><div style="color:${color};font-size:14px;font-weight:800;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid ${color}33">${title}</div>${body}</div>`:''}
  function tags(arr,color,bg){return arr.length?`<div style="display:flex;flex-wrap:wrap;gap:6px">${arr.map(v=>`<span style="background:${bg};border:1px solid ${color}55;color:${color};border-radius:10px;padding:3px 10px;font-size:12px;font-weight:700">${v}</span>`).join('')}</div>`:'' }
 
  return `<div id="fullLog" style="background:linear-gradient(160deg,#0f0a1e,#1a0533 55%,#0d1a0d);border-radius:24px;padding:26px 22px;max-width:420px;margin:0 auto;border:1px solid rgba(192,132,252,0.18)">
    <div style="text-align:center;margin-bottom:20px">
      <div style="color:#f9a8d4;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase">IssaBookVibe — Full Log</div>
      <div style="color:#f3e8ff;font-size:22px;font-weight:800;margin-top:8px">${S.title||'—'}</div>
      <div style="color:#c084fc;font-size:13px">by ${S.author||'—'}</div>
      ${vibeEmojiStr?`<div style="font-size:26px;margin-top:8px;letter-spacing:8px">${vibeEmojiStr}</div>`:''}
    </div>
    ${sec('📖 The Book','#c084fc', row('Author Vibes',S.authorVibe)+row('Format',S.format))}
    ${sec("✨ It's Giving...",'#f9a8d4', tags(S.itsGiving,'#f9a8d4','rgba(249,168,212,0.09)'))}
    ${sec('🌶️ Spice Factor','#fca5a5', S.spice?`<div style="background:rgba(239,68,68,0.09);border:1px solid rgba(239,68,68,0.22);border-radius:10px;padding:10px;color:#fca5a5;font-size:13px;font-weight:700">${S.spice}</div>`:'')}
    ${sec('👥 The Characters','#4ade80',
      (S.fmcAdded&&(S.fmcVibe.length||S.fmcName)?`<div style="color:#f9a8d4;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">She's That Girl${S.fmcName?' — '+S.fmcName:''}</div>${tags(S.fmcVibe,'#f9a8d4','rgba(236,72,153,0.09)')}`:'')+
      (S.mmcAdded&&(S.mmcVibe.length||S.mmcName)?`<div style="color:#c084fc;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px">He's That Dude${S.mmcName?' — '+S.mmcName:''}</div>${tags(S.mmcVibe,'#c084fc','rgba(124,58,237,0.09)')}`:'')||
      '<span style="color:#6b7280;font-size:12px">No character info added</span>'
    )}
    ${sec('💬 The Verdict','#fbbf24',
      row('The Plot Had Me Like',S.plotHadMe)+
      row('That Ending Tho',S.thatEnding)+
      (S.finalVibe.length?`<div style="margin-top:12px;background:linear-gradient(135deg,rgba(74,222,128,0.1),rgba(192,132,252,0.1));border:1px solid rgba(74,222,128,0.32);border-radius:12px;padding:12px;text-align:center">
        <div style="color:#4ade80;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px">Final Vibe Check</div>
        ${tags(S.finalVibe,'#4ade80','rgba(74,222,128,0.1)')}
      </div>`:'')||'<span style="color:#6b7280;font-size:12px">No verdict yet</span>'
    )}
  </div>`;
}
 
function sendToSheets(){
  if(!SHEETS_WEBHOOK_URL || SHEETS_WEBHOOK_URL.indexOf('PASTE_YOUR')===0) return;
  const payload = {
    tab: 'Journals',
    data: {
      timestamp: new Date().toISOString(),
      source: 'book-log',
      title: S.title, author: S.author,
      authorVibe: S.authorVibe, format: S.format,
      vibeEmojis: Array.isArray(S.vibeEmojis)?S.vibeEmojis.join(''):S.vibeEmojis,
      itsGiving: S.itsGiving, spice: S.spice,
      fmcAdded: S.fmcAdded, fmcName: S.fmcName, fmcVibe: S.fmcVibe,
      mmcAdded: S.mmcAdded, mmcName: S.mmcName, mmcVibe: S.mmcVibe,
      plotHadMe: S.plotHadMe, thatEnding: S.thatEnding,
      finalVibe: S.finalVibe
    }
  };
  try{
    fetch(SHEETS_WEBHOOK_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).catch(()=>{});
  }catch(e){}
}
 
function saveCard(){
  const el=document.getElementById('vibeCard');
  if(!el){alert('Generate the card first!');return;}
  const btn=document.getElementById('saveBtn');
  btn.textContent='Saving...';btn.disabled=true;
  html2canvas(el,{backgroundColor:'#0a0618',scale:3,useCORS:true,allowTaint:true,logging:false}).then(canvas=>{
    const link=document.createElement('a');
    link.download=`IssaBookVibe_${(S.title||'card').replace(/\s+/g,'_')}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    btn.textContent='💾 Save Vibe Card';btn.disabled=false;
  }).catch(()=>{btn.textContent='💾 Save Vibe Card';btn.disabled=false;alert('Could not save — try a screenshot!');});
}
function saveLog(){
  const el=document.getElementById('fullLog');
  if(!el){alert('No log to save!');return;}
  const btn=document.getElementById('saveLogBtn');
  btn.textContent='Saving PDF...';btn.disabled=true;
  if(typeof window.jspdf==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>doSaveLog(el,btn);
    s.onerror=()=>{btn.textContent='💾 Save Full Log (PDF)';btn.disabled=false;};
    document.head.appendChild(s);
  } else { doSaveLog(el,btn); }
}
function doSaveLog(el,btn){
  html2canvas(el,{backgroundColor:'#0a0618',scale:2,useCORS:true,allowTaint:true,logging:false}).then(canvas=>{
    try{
      const {jsPDF}=window.jspdf;
      const imgData=canvas.toDataURL('image/png');
      const pdfW=210;
      const pdfH=Math.round((canvas.height*pdfW)/canvas.width);
      const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:[pdfW,pdfH]});
      pdf.addImage(imgData,'PNG',0,0,pdfW,pdfH);
      pdf.save(`IssaBookVibe_FullLog_${(S.title||'log').replace(/\s+/g,'_')}.pdf`);
    } catch(e){
      const link=document.createElement('a');
      link.download=`IssaBookVibe_FullLog_${(S.title||'log').replace(/\s+/g,'_')}.pdf`;
      link.href=canvas.toDataURL('image/png');
      link.click();
    }
    btn.textContent='💾 Save Full Log (PDF)';btn.disabled=false;
  }).catch(()=>{btn.textContent='💾 Save Full Log (PDF)';btn.disabled=false;});
}
window.saveCard=saveCard;window.saveLog=saveLog;window.doSaveLog=doSaveLog;
 
function render(){
  const header=`<div style="background:linear-gradient(90deg,#12042a,#081208);padding:14px 24px;border-bottom:1px solid rgba(192,132,252,0.18);text-align:center;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)">
    <div style="display:inline-flex;align-items:center;background:#000;padding:5px 12px;border-radius:9px;border:1.5px solid rgba(192,132,252,0.3)">
      <span style="color:#fff;font-size:14px;font-weight:900">Issa</span>
      <span style="color:#f9a8d4;font-size:14px;font-weight:800;font-style:italic;margin-left:3px">Book</span>
      <span style="color:#4ade80;font-size:14px;font-weight:900;letter-spacing:1px;margin-left:4px">VIBE</span>
    </div>
    <div style="font-size:8px;color:#a78bfa;letter-spacing:4px;text-transform:uppercase;margin-top:3px">book log</div>
  </div>`;
 
  let body='';
  if(S.view==='form'){
    const pills=STEPS.map((s,i)=>`<button onclick="S.step=${i};render()" style="flex-shrink:0;padding:8px 14px;border-radius:20px;border:none;background:${i===S.step?'linear-gradient(135deg,#7e22ce,#be185d)':i<S.step?'rgba(74,222,128,0.17)':'rgba(255,255,255,0.06)'};color:${i===S.step?'#fff':i<S.step?'#4ade80':'#9ca3af'};font-size:12px;font-weight:${i===S.step?800:600}">${i<S.step?'✓ ':''}${s}</button>`).join('');
    const prev=S.step>0?`<button onclick="S.step--;render()" style="flex:1;padding:14px;border-radius:14px;border:1.5px solid rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:14px;font-weight:700">← Back</button>`:'';
    const next=S.step<STEPS.length-1
      ?`<button onclick="S.step++;render()" style="flex:2;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#7e22ce,#be185d);color:#fff;font-size:14px;font-weight:800">Next: ${STEPS[S.step+1]} →</button>`
      :`<button onclick="S.view='result';sendToSheets();render()" style="flex:2;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#15803d,#7e22ce);color:#fff;font-size:15px;font-weight:800;box-shadow:0 0 22px rgba(74,222,128,0.28)">✨ Generate My Vibe Card ✨</button>`;
    body=`
      <div style="display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px">${pills}</div>
      <div class="scard">${stepHTML()}</div>
      <div style="display:flex;gap:12px">${prev}${next}</div>
      <div class="privacy-note">Anonymous usage data helps us improve the app 💜</div>`;
  } else {
    const tabs=['card','detail'].map(t=>`<button onclick="S.tab='${t}';render()" style="flex:1;padding:12px;border-radius:12px;border:none;background:${S.tab===t?'linear-gradient(135deg,#7e22ce,#be185d)':'rgba(255,255,255,0.06)'};color:${S.tab===t?'#fff':'#9ca3af'};font-size:13px;font-weight:700">${t==='card'?'📸 Vibe Card':'📖 Full Log'}</button>`).join('');
    const saveBtn=S.tab==='card'
      ?`<button id="saveBtn" onclick="saveCard()" style="width:100%;margin-top:12px;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#1d4ed8,#7e22ce);color:#fff;font-size:14px;font-weight:800;box-shadow:0 0 18px rgba(99,102,241,0.3)">💾 Save Vibe Card</button>`
      :`<button id="saveLogBtn" onclick="saveLog()" style="width:100%;margin-top:12px;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#1d4ed8,#7e22ce);color:#fff;font-size:14px;font-weight:800;box-shadow:0 0 18px rgba(99,102,241,0.3)">💾 Save Full Log (PDF)</button>`;
    body=`
      <div style="display:flex;gap:8px;margin-bottom:18px">${tabs}</div>
      ${S.tab==='card'?shareCard():fullLog()}
      ${saveBtn}
      <button onclick="S.view='form';S.step=0;render()" style="width:100%;margin-top:10px;padding:14px;border-radius:14px;border:1.5px solid rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:14px;font-weight:700">← Log Another Book</button>
      <div class="privacy-note">Anonymous usage data helps us improve the app 💜</div>`;
  }
  document.getElementById('app').innerHTML=header+`<div style="max-width:480px;margin:0 auto;padding:20px 16px">${body}</div>`;
}
window.render=render;
render();
</script>
</body>
