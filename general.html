<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#0a0618 0%,#130826 55%,#091508 100%);font-family:'DM Sans',sans-serif;color:#f3e8ff;padding-bottom:60px}
input[type=text],input[type=file]{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(196,181,253,0.3);border-radius:12px;padding:12px 16px;color:#f3e8ff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
input[type=text]::placeholder{color:#6b7280}
input[type=text]:focus{border-color:#c084fc}
input[type=file]{padding:10px 14px;cursor:pointer;color:#c4b5fd}
input[type=file]::file-selector-button{background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.3);border-radius:8px;color:#c084fc;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-right:10px}
button{cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(192,132,252,0.4);border-radius:4px}
.chip{display:inline-flex;align-items:center;padding:7px 14px;border-radius:20px;border:2px solid #4a4a6a;background:rgba(255,255,255,0.05);color:#c4b5fd;font-size:12px;font-weight:600;cursor:pointer;margin:3px;transition:all 0.18s}
.chip.on{border-color:#c084fc;background:linear-gradient(135deg,#7e22ce,#be185d);color:#fff;font-weight:700}
.chip.emoji{font-size:20px;padding:6px 9px;border-radius:10px}
.slabel{color:#c4b5fd;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:18px;margin-bottom:8px}
.scard{background:rgba(255,255,255,0.03);border-radius:18px;padding:20px;border:1px solid rgba(192,132,252,0.12);margin-bottom:14px}
.listopt{padding:11px 16px;border-radius:11px;margin-bottom:6px;cursor:pointer;border:1.5px solid rgba(196,181,253,0.18);color:#c4b5fd;font-size:13px;background:rgba(255,255,255,0.04);transition:all 0.2s;font-family:'DM Sans',sans-serif}
.listopt.spice.on{background:linear-gradient(135deg,rgba(239,68,68,0.28),rgba(126,34,206,0.28));border-color:#ef4444;color:#fca5a5;font-weight:700}
.listopt.ending.on{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(6,95,70,0.18));border-color:#4ade80;color:#4ade80;font-weight:700}
.listopt.fvc.on{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(192,132,252,0.18));border-color:#4ade80;color:#4ade80;font-weight:700}
.char-section-head{font-size:14px;font-weight:800;margin:20px 0 14px;padding:10px 14px;border-radius:12px;letter-spacing:0}
</style>
</head>
<body>
<div id="app"></div>
<script>

const DATA={

  format:['E-Book','Paperback','Audiobook','Hardcover','Other'],

  spice:['Ώθγς Closed-Door Romance','Ώθτο Flirty and Sweet','Ώθνν A Little Drool Worthy','ΏθΝ╢Ύ╕Π Spicy AF','ΏθΤο NSFW (Not Safe For Work)','Ώθξ╡ Complete Smut No Plot'],

  theFeels:['ΏθαΛ','Ώθξ░','ΏθαΞ','ΏθαΗ','Ώθνμ','ΏθαΠ','Ώθαυ','ΏθαΖ','Ώθνφ','Ώθτμ','ΏθαΤ','ΏθβΕ','ΏθνΦ','Ώθνρ','ΏθαΣ','Ώθτι','Ώθξ┤','Ώθα│','Ώθαχ','Ώθτρ','Ώθνψ','Ώθαι','Ώθνυ','Ώθαν','ΏθαΧ','ΏθαΦ','Ώθατ','Ώθαφ','Ώθξ╣','Ώθαλ','ΏθΤΦ','Ώθα░','Ώθα▒','Ώθαχ\u200dΏθΤρ','Ώθξ▒','ΏθΟλ'],
  finalVibe:['Not My Vibe','DNF (Did Not Finish)','Almost DNF','Hated It','Overhyped','It Was OK','I Enjoyed It',"I Couldn't Get Enough",'Loved It','Top 10 Favorite List','Favorite Book Of All Time','Would Not Recommend','Would Totally Recommend','Memorable','Not Very Memorable','Realistic/Relatable','Unrealistic/Unrelatable','Totally My Vibe']
};

const STEPS=['ΏθΥΨ The Book',"έερ It's Giving",'ΏθΣξ Characters','ΏθΤυ The Verdict'];

let S={
  step:0,view:'form',tab:'card',
  title:'',author:'',coverDataUrl:'',
  vibeEmojis:'',authorVibe:'',format:'',
  itsGiving:[],
  fmc:[],mmc:[],
  spice:'',plotHadMe:'',thatEnding:'',
  theFeels:[],finalVibe:[]
};
window.S=S;

function upd(){render()}
function toggle1(k,v){S[k]=S[k]===v?'':v;upd()}
function toggleN(k,v,max){
  const a=S[k];
  if(a.includes(v)){S[k]=a.filter(x=>x!==v)}
  else if(!max||a.length<max){S[k]=[...a,v]}
  upd();
}
window.toggle1=toggle1;window.toggleN=toggleN;

function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function lbl(t){return `<div class="slabel">${t}</div>`}
function count(k,max){return `<div style="font-size:11px;color:#9ca3af;margin-bottom:8px">${S[k].length}/${max} selected</div>`}

function handleCover(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{S.coverDataUrl=e.target.result;upd()};
  reader.readAsDataURL(file);
}
window.handleCover=handleCover;

function chipSet(k,opts,max){
  return `<div style="display:flex;flex-wrap:wrap">${opts.map(o=>{
    const on=Array.isArray(S[k])?S[k].includes(o):S[k]===o;
    const fn=Array.isArray(S[k])?`toggleN('${k}','${esc(o)}',${max||99})`:`toggle1('${k}','${esc(o)}')`;
    return `<span class="chip ${on?'on':''}" onclick="${fn}">${o}</span>`;
  }).join('')}</div>`;
}
function listOpts(k,opts,cls){
  return opts.map(o=>`<div class="listopt ${cls} ${S[k]===o?'on':''}" onclick="toggle1('${k}','${esc(o)}')">${o}</div>`).join('');
}

// έΦΑέΦΑ FORM STEPS έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function stepHTML(){
  if(S.step===0) return `
    ${lbl('Title *')}
    <input type="text" placeholder="What are we reading?" value="${esc(S.title)}" oninput="S.title=this.value"/>
    ${lbl('Author *')}
    <input type="text" placeholder="Who wrote it?" value="${esc(S.author)}" oninput="S.author=this.value"/>

    ${lbl('Format (choose 1)')}${chipSet('format',DATA.format)}
    ${lbl('Book Cover (optional)')}
    ${S.coverDataUrl
      ?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
           <img src="${S.coverDataUrl}" style="width:60px;height:80px;object-fit:cover;border-radius:8px;border:2px solid rgba(192,132,252,0.4)"/>
           <button onclick="S.coverDataUrl='';upd()" style="padding:6px 14px;border-radius:10px;border:1.5px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);color:#fca5a5;font-size:12px;font-weight:700">Remove</button>
         </div>`:''}

    ${lbl('Emojis That Represent The Overall Vibe (up to 3)')}
    <input type="text" placeholder="Type or paste up to 3 emojis έερΏθΦξΏθΤΑ" value="${esc(S.vibeEmojis)}" oninput="S.vibeEmojis=this.value" style="font-size:22px;letter-spacing:6px"/>`;

  if(S.step===1) return `
    ${lbl("It's Giving... (up to 5)")}${count('itsGiving',5)}
    ${chipSet('itsGiving',DATA.itsGiving,5)}
    <div style="margin-top:20px">
      ${lbl('Spice Factor (choose 1)')}
      ${listOpts('spice',DATA.spice,'spice')}
    </div>`;

  if(S.step===2) return `
    <div class="char-section-head" style="background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.25);color:#f9a8d4">

      He's That Dude έΑΦ MMC
    </div>
    ${lbl('MMC Vibe (up to 3)')}${count('mmc',3)}
    ${chipSet('mmc',DATA.mmc,3)}`;

  if(S.step===3) return `
    ${lbl('The Plot Had Me Like... (choose 1)')}
    ${chipSet('plotHadMe',DATA.plotHadMe)}
    <div style="margin-top:16px">
      ${lbl('That Ending Tho... (choose 1)')}
      ${listOpts('thatEnding',DATA.thatEnding,'ending')}
    </div>
    <div style="margin-top:16px">
      ${lbl('The Feels... (up to 3)')}${count('theFeels',3)}
      <div style="display:flex;flex-wrap:wrap;gap:3px">${DATA.theFeels.map(e=>`<span class="chip emoji ${S.theFeels.includes(e)?'on':''}" onclick="toggleN('theFeels','${e}',3)">${e}</span>`).join('')}</div>
    </div>
    <div style="margin-top:16px">
      ${lbl('Final Vibe Check (up to 3)')}${count('finalVibe',3)}
      ${DATA.finalVibe.map(v=>`<div class="listopt fvc ${S.finalVibe.includes(v)?'on':''}" onclick="toggleN('finalVibe','${esc(v)}',3)">${v}</div>`).join('')}
    </div>`;
}

// έΦΑέΦΑ SHARE CARD έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ

    ${S.finalVibe.length?`<div style="background:linear-gradient(135deg,rgba(74,222,128,0.11),rgba(192,132,252,0.11));border:1px solid rgba(74,222,128,0.32);border-radius:14px;padding:14px;text-align:center">
      <div style="color:#4ade80;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px">έεΖ Final Vibe Check</div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:6px">${S.finalVibe.map(v=>`<span style="background:rgba(74,222,128,0.13);border:1px solid rgba(74,222,128,0.38);color:#4ade80;border-radius:10px;padding:4px 12px;font-size:12px;font-weight:700">${v}</span>`).join('')}</div>
    </div>`:''}
  </div>`;
}

// έΦΑέΦΑ FULL LOG έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function fullLog(){
  const vibeEmojiStr=Array.isArray(S.vibeEmojis)?S.vibeEmojis.join(''):S.vibeEmojis;
  function row(label,val){return val?`<div style="display:flex;gap:8px;margin-bottom:7px"><span style="color:#9ca3af;font-size:12px;min-width:110px;flex-shrink:0">${label}</span><span style="color:#f3e8ff;font-size:12px;flex:1">${val}</span></div>`:''}
  function sec(title,color,body){return body?`<div style="margin-bottom:18px"><div style="color:${color};font-size:14px;font-weight:800;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid ${color}33">${title}</div>${body}</div>`:''}
  function tags(arr,color,bg){return arr.length?`<div style="display:flex;flex-wrap:wrap;gap:6px">${arr.map(v=>`<span style="background:${bg};border:1px solid ${color}55;color:${color};border-radius:10px;padding:3px 10px;font-size:12px;font-weight:700">${v}</span>`).join('')}</div>`:'' }

  return `<div id="fullLog" style="background:linear-gradient(160deg,#0f0a1e,#1a0533 55%,#0d1a0d);border-radius:24px;padding:26px 22px;max-width:420px;margin:0 auto;border:1px solid rgba(192,132,252,0.18)">
    <div style="text-align:center;margin-bottom:20px">
      <div style="color:#f9a8d4;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase">IssaBookVibe έΑΦ Full Log</div>
      <div style="color:#f3e8ff;font-size:22px;font-weight:800;margin-top:8px">${S.title||'έΑΦ'}</div>
      <div style="color:#c084fc;font-size:13px">by ${S.author||'έΑΦ'}</div>
      ${vibeEmojiStr?`<div style="font-size:26px;margin-top:8px;letter-spacing:8px">${vibeEmojiStr}</div>`:''}
    </div>
    ${sec('ΏθΥΨ The Book','#c084fc', row('Author Vibes',S.authorVibe)+row('Format',S.format))}
    ${sec("έερ It's Giving...",'#f9a8d4', tags(S.itsGiving,'#f9a8d4','rgba(249,168,212,0.09)'))}
    ${sec('ΏθΝ╢Ύ╕Π Spice Factor','#fca5a5', S.spice?`<div style="background:rgba(239,68,68,0.09);border:1px solid rgba(239,68,68,0.22);border-radius:10px;padding:10px;color:#fca5a5;font-size:13px;font-weight:700">${S.spice}</div>`:'')}
    ${sec('ΏθΣξ The Characters','#4ade80',
      (S.fmc.length?`<div style="color:#f9a8d4;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">She's That Girl</div>${tags(S.fmc,'#f9a8d4','rgba(236,72,153,0.09)')}`:'')+
      (S.mmc.length?`<div style="color:#c084fc;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px">He's That Dude</div>${tags(S.mmc,'#c084fc','rgba(124,58,237,0.09)')}`:'')||
      '<span style="color:#6b7280;font-size:12px">No character info added</span>'
    )}
    ${sec('ΏθΤυ The Verdict','#fbbf24',
      row('The Plot Had Me Like',S.plotHadMe)+
      row('That Ending Tho',S.thatEnding)+
      (S.theFeels.length?`<div style="margin-bottom:8px"><span style="color:#9ca3af;font-size:12px;display:block;margin-bottom:4px">The Feels</span><span style="font-size:24px;letter-spacing:8px">${S.theFeels.join('')}</span></div>`:'')+
      (S.finalVibe.length?`<div style="margin-top:12px;background:linear-gradient(135deg,rgba(74,222,128,0.1),rgba(192,132,252,0.1));border:1px solid rgba(74,222,128,0.32);border-radius:12px;padding:12px;text-align:center">
        <div style="color:#4ade80;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px">Final Vibe Check</div>
        ${tags(S.finalVibe,'#4ade80','rgba(74,222,128,0.1)')}
      </div>`:'')||'<span style="color:#6b7280;font-size:12px">No verdict yet</span>'
    )}
  </div>`;
}

// έΦΑέΦΑ SAVE FUNCTIONS έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function saveCard(){
  const el=document.getElementById('vibeCard');
  if(!el){alert('Generate the card first!');return;}
  const btn=document.getElementById('saveBtn');
  btn.textContent='Saving...';btn.disabled=true;
  html2canvas(el,{backgroundColor:'#0a0618',scale:3,useCORS:true,allowTaint:true,logging:false}).then(canvas=>{
    const link=document.createElement('a');
    link.download=`IssaBookVibe_${(S.title||'card').replace(/\s+/g,'_')}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    btn.textContent='ΏθΤ╛ Save Vibe Card';btn.disabled=false;
  }).catch(()=>{btn.textContent='ΏθΤ╛ Save Vibe Card';btn.disabled=false;alert('Could not save έΑΦ try a screenshot!');});
}
function saveLog(){
  const el=document.getElementById('fullLog');
  if(!el){alert('No log to save!');return;}
  const btn=document.getElementById('saveLogBtn');
  btn.textContent='Saving PDF...';btn.disabled=true;
  if(typeof window.jspdf==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>doSaveLog(el,btn);
    s.onerror=()=>{btn.textContent='ΏθΤ╛ Save Full Log (PDF)';btn.disabled=false;};
    document.head.appendChild(s);
  } else { doSaveLog(el,btn); }
}
function doSaveLog(el,btn){
  html2canvas(el,{backgroundColor:'#0a0618',scale:2,useCORS:true,allowTaint:true,logging:false}).then(canvas=>{
    try{
      const {jsPDF}=window.jspdf;
      const imgData=canvas.toDataURL('image/png');
      const pdfW=210;
      const pdfH=Math.round((canvas.height*pdfW)/canvas.width);
      const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:[pdfW,pdfH]});
      pdf.addImage(imgData,'PNG',0,0,pdfW,pdfH);
      pdf.save(`IssaBookVibe_FullLog_${(S.title||'log').replace(/\s+/g,'_')}.pdf`);
    } catch(e){
      const link=document.createElement('a');
      link.download=`IssaBookVibe_FullLog_${(S.title||'log').replace(/\s+/g,'_')}.pdf`;
      link.href=canvas.toDataURL('image/png');
      link.click();
    }
    btn.textContent='ΏθΤ╛ Save Full Log (PDF)';btn.disabled=false;
  }).catch(()=>{btn.textContent='ΏθΤ╛ Save Full Log (PDF)';btn.disabled=false;});
}
window.saveCard=saveCard;window.saveLog=saveLog;window.doSaveLog=doSaveLog;

// έΦΑέΦΑ RENDER έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function render(){
  const header=`<div style="background:linear-gradient(90deg,#12042a,#081208);padding:14px 24px;border-bottom:1px solid rgba(192,132,252,0.18);text-align:center;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px)">
    <div style="display:inline-flex;align-items:center;background:#000;padding:5px 12px;border-radius:9px;border:1.5px solid rgba(192,132,252,0.3)">
      <span style="color:#fff;font-size:14px;font-weight:900">Issa</span>
      <span style="color:#f9a8d4;font-size:14px;font-weight:800;font-style:italic;margin-left:3px">Book</span>
      <span style="color:#4ade80;font-size:14px;font-weight:900;letter-spacing:1px;margin-left:4px">VIBE</span>
    </div>
    <div style="font-size:8px;color:#a78bfa;letter-spacing:4px;text-transform:uppercase;margin-top:3px">book log</div>
  </div>`;

  let body='';
  if(S.view==='form'){
    const pills=STEPS.map((s,i)=>`<button onclick="S.step=${i};render()" style="flex-shrink:0;padding:8px 14px;border-radius:20px;border:none;background:${i===S.step?'linear-gradient(135deg,#7e22ce,#be185d)':i<S.step?'rgba(74,222,128,0.17)':'rgba(255,255,255,0.06)'};color:${i===S.step?'#fff':i<S.step?'#4ade80':'#9ca3af'};font-size:12px;font-weight:${i===S.step?800:600}">${i<S.step?'έεΥ ':''}${s}</button>`).join('');
    const prev=S.step>0?`<button onclick="S.step--;render()" style="flex:1;padding:14px;border-radius:14px;border:1.5px solid rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:14px;font-weight:700">έΗΡ Back</button>`:'';
    const next=S.step<STEPS.length-1
      ?`<button onclick="S.step++;render()" style="flex:2;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#7e22ce,#be185d);color:#fff;font-size:14px;font-weight:800">Next: ${STEPS[S.step+1]} έΗΤ</button>`
      :`<button onclick="S.view='result';render()" style="flex:2;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#15803d,#7e22ce);color:#fff;font-size:15px;font-weight:800;box-shadow:0 0 22px rgba(74,222,128,0.28)">έερ Generate My Vibe Card έερ</button>`;
    body=`
      <div style="display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px">${pills}</div>
      <div class="scard">${stepHTML()}</div>
      <div style="display:flex;gap:12px">${prev}${next}</div>`;
  } else {
    const tabs=['card','detail'].map(t=>`<button onclick="S.tab='${t}';render()" style="flex:1;padding:12px;border-radius:12px;border:none;background:${S.tab===t?'linear-gradient(135deg,#7e22ce,#be185d)':'rgba(255,255,255,0.06)'};color:${S.tab===t?'#fff':'#9ca3af'};font-size:13px;font-weight:700">${t==='card'?'ΏθΥ╕ Vibe Card':'ΏθΥΨ Full Log'}</button>`).join('');
    const saveBtn=S.tab==='card'
      ?`<button id="saveBtn" onclick="saveCard()" style="width:100%;margin-top:12px;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#1d4ed8,#7e22ce);color:#fff;font-size:14px;font-weight:800;box-shadow:0 0 18px rgba(99,102,241,0.3)">ΏθΤ╛ Save Vibe Card</button>`
      :`<button id="saveLogBtn" onclick="saveLog()" style="width:100%;margin-top:12px;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#1d4ed8,#7e22ce);color:#fff;font-size:14px;font-weight:800;box-shadow:0 0 18px rgba(99,102,241,0.3)">ΏθΤ╛ Save Full Log (PDF)</button>`;
    body=`
      <div style="display:flex;gap:8px;margin-bottom:18px">${tabs}</div>
      ${S.tab==='card'?shareCard():fullLog()}
      ${saveBtn}
      <button onclick="S.view='form';S.step=0;render()" style="width:100%;margin-top:10px;padding:14px;border-radius:14px;border:1.5px solid rgba(196,181,253,0.3);background:transparent;color:#c4b5fd;font-size:14px;font-weight:700">έΗΡ Log Another Book</button>`;
  }
  document.getElementById('app').innerHTML=header+`<div style="max-width:480px;margin:0 auto;padding:20px 16px">${body}</div>`;
}
window.render=render;
render();
</script>
